<!-- ================= ADMIN MENU HTML ================= -->

<div class="menu-container">
  <!-- Create Item Slide-In Panel -->
  <div id="create-item-form-panel">
    <div class="panel-header">
      <h3 data-i18n="admin.add-menu-item">Add Menu Item</h3>
      <button class="panel-close" onclick="cancelCreateItem()">✕</button>
    </div>
    <div class="panel-content">
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="admin.item-name">Item Name</label>
          <input id="new-item-name" data-i18n="admin.item-name-placeholder" placeholder="e.g., Caesar Salad" />
        </div>
        <div class="form-group">
          <label data-i18n="admin.price-cents">Price (cents)</label>
          <input id="new-item-price" type="number" data-i18n="admin.price-placeholder" placeholder="e.g., 1200" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="admin.category">Category</label>
          <select id="new-item-category" required>
            <option value="" data-i18n="admin.select-category">-- Select a category --</option>
          </select>
        </div>
      </div>
      <div class="form-row">
      <div class="form-group">
        <label data-i18n="admin.description">Description</label>
        <textarea id="new-item-desc" data-i18n="admin.description-placeholder" placeholder="Add a detailed description of the menu item..."></textarea>
      </div>
      </div>
      <div class="form-group">
        <label data-i18n="admin.item-image">Food Item Image <span class="info-hint" data-i18n="admin.recommended-size">(Recommended: 400px × 300px)</span></label>
        <div class="image-upload-input">
          <div id="new-item-image-preview" class="image-preview-box" style="cursor: pointer;" onclick="document.getElementById('new-item-image').click()">
            <div class="upload-placeholder" data-i18n="admin.upload-image">📸 Click to upload image</div>
          </div>
          <input type="file" id="new-item-image" accept="image/*" onchange="previewItemImage(this)" class="hidden-file-input"/>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button onclick="createMenuItem()" class="btn-primary" data-i18n="admin.create-item">✓ Create Item</button>
      <button onclick="cancelCreateItem()" class="btn-secondary" data-i18n="admin.cancel-item">✕ Cancel</button>
    </div>
  </div>

  <div id="menu-items">
    <!-- JS renders categories + items here -->
  </div>

  <!-- Food Item Detail Slide-In Panel -->
  <div id="food-item-panel" class="food-item-panel">
    <div class="food-item-panel-overlay" onclick="closeFoodItemPanel()"></div>
    <div class="food-item-panel-content">
      <button class="food-item-panel-close" onclick="closeFoodItemPanel()">✕</button>
      
      <div class="food-item-panel-image-section">
        <img id="food-panel-image" src="" alt="Food Item" class="food-item-panel-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23e5e7eb%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2220%22 fill=%22%23999%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3ENo Image%3C/text%3E%3C/svg%3E';"/>
        <input id="food-panel-image-input" type="file" accept="image/*" style="display: none;" onchange="previewFoodPanelImage(this)" />
        <button id="food-panel-change-image-btn" onclick="document.getElementById('food-panel-image-input').click()" style="display: none; margin-top: 8px; padding: 6px 12px; background: #2C3E50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">Change Image</button>
      </div>

      <div class="food-item-panel-details">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <div style="flex: 1;">
            <h2 id="food-panel-name" class="food-item-panel-title"></h2>
            <input id="food-panel-name-input" type="text" style="display: none; font-size: 20px; font-weight: bold; padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100%; margin-bottom: 8px;" />
          </div>
          <div>
            <button id="food-panel-edit-btn" class="btn-secondary" onclick="toggleFoodItemEdit()" data-i18n="admin.edit"><img src="/uploads/website/pencil.png" alt="edit" style="width: 16px; height: 16px; vertical-align: middle;"> Edit</button>
            <button id="food-panel-save-btn" class="btn-primary" onclick="saveFoodItemEdit()" data-i18n="admin.save" style="display: none; margin-left: 8px;">✓ Save</button>
            <button id="food-panel-cancel-btn" class="btn-secondary" onclick="cancelFoodItemEdit()" style="display: none; margin-left: 8px;">✕ Cancel</button>
          </div>
        </div>
        
        <div class="food-item-panel-price">
          <span class="label" data-i18n="admin.price">Price:</span>
          <span id="food-panel-price" class="price-value"></span>
          <input id="food-panel-price-input" type="number" style="display: none; width: 100px; margin-left: 8px;" />
        </div>

        <div class="food-item-panel-description">
          <label data-i18n="admin.description">Description:</label>
          <p id="food-panel-desc"></p>
          <textarea id="food-panel-desc-input" style="display: none; width: 100%; min-height: 80px;"></textarea>
        </div>

        <div class="food-item-panel-variants-section">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h3 data-i18n="admin.variants">Variants</h3>
            <button id="food-panel-add-variant-btn" onclick="startAddVariantFromPanel()" data-i18n="admin.add-variant" style="display: none; padding: 4px 8px; background: #2C3E50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">+ Add</button>
          </div>
          <div id="food-panel-variants" class="food-panel-variants-container">
            <!-- Variants rendered here -->
          </div>

          <!-- Variant Edit Form (hidden by default, shown when adding/editing) -->
          <div id="food-panel-variant-form" style="display: none; margin-top: 16px; padding: 12px; background: #f9f9f9; border-radius: 6px; border: 1px solid #ddd;">
            <h4 data-i18n="admin.variant-form-title" style="margin-top: 0;">Add/Edit Variant</h4>
            <div style="display: flex; flex-direction: column; gap: 8px;">
              <div>
                <label data-i18n="admin.variant-name" style="display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px;">Variant Name</label>
                <input id="food-panel-variant-name" type="text" data-i18n="admin.variant-name-placeholder" placeholder="e.g., Size, Extras" style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px;" />
              </div>
              <div style="display: flex; gap: 8px;">
                <div style="flex: 1;">
                  <label data-i18n="admin.variant-min-select" style="display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px;">Min Select</label>
                  <input id="food-panel-variant-min" type="number" min="0" placeholder="0" style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px;" />
                </div>
                <div style="flex: 1;">
                  <label data-i18n="admin.variant-max-select" style="display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px;">Max Select</label>
                  <input id="food-panel-variant-max" type="number" min="0" placeholder="0" style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px;" />
                </div>
              </div>
              <div>
                <label style="display: flex; align-items: center; font-size: 12px;">
                  <input id="food-panel-variant-required" type="checkbox" style="margin-right: 6px;" />
                  <span data-i18n="admin.variant-required">Required</span>
                </label>
              </div>

              <!-- Variant Options Section (only shown when editing) -->
              <div id="food-panel-variant-options-section" style="display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #ddd;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                  <label data-i18n="admin.variant-options" style="font-size: 12px; font-weight: 500;">Options</label>
                  <button onclick="startAddVariantOption()" data-i18n="admin.add-option" style="padding: 2px 8px; background: #2C3E50; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 11px;">+ Add Option</button>
                </div>
                <div id="food-panel-variant-options-list" style="display: flex; flex-direction: column; gap: 6px;">
                  <!-- Options rendered here -->
                </div>
              </div>

              <!-- Add Option Form (hidden by default) -->
              <div id="food-panel-variant-option-form" style="display: none; margin-top: 8px; padding: 8px; background: #fff; border: 1px solid #ddd; border-radius: 4px;">
                <h5 style="margin: 0 0 8px 0; font-size: 12px;">Add Option</h5>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                  <div>
                    <label data-i18n="admin.option-name" style="display: block; font-size: 11px; font-weight: 500; margin-bottom: 2px;">Option Name</label>
                    <input id="food-panel-option-name" type="text" data-i18n="admin.option-name-placeholder" placeholder="e.g., Small, Extra Cheese" style="width: 100%; padding: 4px; border: 1px solid #ddd; border-radius: 3px; font-size: 11px;" />
                  </div>
                  <div>
                    <label data-i18n="admin.option-price-label" style="display: block; font-size: 11px; font-weight: 500; margin-bottom: 2px;">Price (cents) - optional</label>
                    <input id="food-panel-option-price" type="number" placeholder="0" style="width: 100%; padding: 4px; border: 1px solid #ddd; border-radius: 3px; font-size: 11px;" />
                  </div>
                  <div style="display: flex; gap: 4px;">
                    <button onclick="saveVariantOption()" data-i18n="admin.save-option" style="flex: 1; padding: 4px; background: #2C3E50; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 11px;">Save</button>
                    <button onclick="cancelVariantOptionForm()" data-i18n="admin.cancel-option" style="flex: 1; padding: 4px; background: #999; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 11px;">Cancel</button>
                  </div>
                </div>
              </div>

              <div style="display: flex; gap: 6px;">
              <button onclick="if (currentEditingVariantId) saveEditedVariantFromPanel(); else saveNewVariantFromPanel();" data-i18n="admin.save-variant" style="flex: 1; padding: 6px; background: #2C3E50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">Save Variant</button>
              <button onclick="cancelVariantForm()" data-i18n="admin.cancel-variant" style="flex: 1; padding: 6px; background: #999; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">Cancel</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Left Column Wrapper (for mobile layout) -->
  <div class="left-column-wrapper">
    <!-- Menu Items Grid -->
    <div id="menu-items-grid" class="menu-grid">
      <!-- JS renders menu item cards here -->
    </div>
  </div>
</div>

<!-- Category Tabs Bar (Bottom) - Outside menu-container -->
<div id="menu-category-tabs" class="menu-tabs-bottom"></div>

<!-- Category Sidebar (Mobile Only) - Outside menu-container -->
<div class="menu-category-sidebar"></div>

<!-- ============= HTML TEMPLATES ============= -->

<!-- Template: Menu Item Card -->
<template id="menu-item-card-template">
  <div class="menu-item-card-wrapper">
    <div class="menu-item-image">
      <img src="" alt="menu-item" class="menu-item-img"/>
    </div>
    <div class="menu-item-info">
      <div class="menu-item-name"></div>
      <div class="menu-item-price"></div>
    </div>
    <div class="menu-edit-controls" style="display: none;">
      <!-- Controls populated by JS -->
    </div>
  </div>
</template>

<!-- Template: Add Item Card -->
<template id="add-item-card-template">
  <div style="display: flex; align-items: center; justify-content: center; height: 100%; font-size: 36px; cursor: pointer;">+</div>
</template>

<!-- Template: Edit Menu Item Modal -->
<template id="edit-menu-item-modal-template">
  <div class="modal-content">
    <div class="modal-header">
      <h2 data-i18n="admin.edit-item">Edit Menu Item</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="admin.item-name">Item Name</label>
          <input type="text" class="edit-item-name" />
        </div>
        <div class="form-group">
          <label data-i18n="admin.price-cents">Price (cents)</label>
          <input type="number" class="edit-item-price" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="admin.category">Category</label>
          <select class="edit-item-category"></select>
        </div>
        <div class="form-group">
          <label data-i18n="admin.availability">Available</label>
          <select class="edit-item-available">
            <option value="true" data-i18n="admin.yes">Yes</option>
            <option value="false" data-i18n="admin.no">No (Sold Out)</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="admin.description">Description</label>
          <textarea class="edit-item-desc" placeholder="Item description..."></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="admin.item-image">Image</label>
          <div class="image-upload-input">
            <div class="edit-item-image-preview image-preview-box">
              <div class="upload-placeholder" data-i18n="admin.upload-image">📸 Click to upload image</div>
            </div>
            <input type="file" class="edit-item-image-input hidden-file-input" accept="image/*"/>
          </div>
        </div>
      </div>
      
      <!-- Item Type Options -->
      <div class="form-row" style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #ddd;">
        <div style="width: 100%; display: flex; gap: 20px;">
          <label style="display: flex; align-items: center; cursor: pointer;">
            <input type="checkbox" class="edit-item-is-meal-combo" style="margin-right: 8px; cursor: pointer;"/>
            <span style="font-weight: 600; font-size: 14px;" data-i18n="admin.is-meal-combo">Is Meal/Combo (Enable Add-ons)</span>
          </label>
          <label style="display: flex; align-items: center; cursor: pointer;">
            <input type="checkbox" class="edit-item-has-variants" style="margin-right: 8px; cursor: pointer;"/>
            <span style="font-weight: 600; font-size: 14px;" data-i18n="admin.has-variants">Has Variants</span>
          </label>
        </div>
      </div>
      
      <!-- Variants Section (shown when has-variants is checked) -->
      <div class="edit-item-variants-section" style="display: none; margin-top: 16px; padding: 12px; background: #f9f9f9; border-radius: 4px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <h4 data-i18n="admin.variants" style="margin: 0;">Variants</h4>
          <button type="button" class="btn-preset-variant-add" style="background: #2C3E50; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;">+ Add Preset</button>
        </div>
        <div class="edit-item-preset-variants-list" style="margin-bottom: 12px;">
          <!-- Preset variants displayed here -->
        </div>
        <div style="font-size: 11px; color: #666;">
          <p data-i18n="admin.variants-info">Select from preset variant lists or manage variants in Settings</p>
        </div>
      </div>
      
      <!-- Addon Configuration Section (shown when is-meal-combo is checked) -->
      <div class="edit-item-addons-section" style="display: none; margin-top: 16px; padding: 12px; background: #f9f9f9; border-radius: 4px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <label data-i18n="admin.available-addons" style="font-weight: 600; font-size: 14px; margin: 0;">Available Add-ons</label>
        </div>
        
        <!-- Preset Addon Selection -->
        <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #ddd;">
          <label style="display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px;" data-i18n="admin.add-preset-list">Add Preset List:</label>
          <div style="display: flex; gap: 6px;">
            <select class="edit-item-preset-addon-select" style="flex: 1; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px;">
              <option value="" data-i18n="admin.select-preset">-- Select preset --</option>
            </select>
            <button type="button" class="btn-add-preset-addon" style="background: #27ae60; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;" data-i18n="admin.add">Add</button>
          </div>
        </div>
        
        <!-- Custom Addon Addition -->
        <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #ddd;">
          <button type="button" class="btn-addon-add" style="background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; width: 100%;" data-i18n="admin.add-custom-addon">+ Add Custom Addon</button>
        </div>
        
        <!-- Configured Addons List -->
        <div style="margin-top: 12px;">
          <label style="display: block; font-size: 12px; font-weight: 600; margin-bottom: 8px;" data-i18n="admin.configured-addons">Configured Add-ons:</label>
          <div class="edit-item-addons-list" style="border: 1px solid #ddd; border-radius: 4px; padding: 8px; min-height: 60px; max-height: 200px; overflow-y: auto; background: white;">
            <!-- Addon items rendered here -->
            <div class="empty-addons-message" style="color: #999; font-size: 12px; padding: 20px; text-align: center;" data-i18n="admin.no-addons">No add-ons configured</div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary modal-save" data-i18n="admin.save">✓ Save</button>
      <button class="btn-secondary modal-cancel" data-i18n="admin.cancel">Cancel</button>
    </div>
  </div>
</template>

<!-- Template: Addon Item in Edit Modal -->
<template id="addon-item-template">
  <div class="addon-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: white; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px;">
    <div style="flex: 1;">
      <div class="addon-item-name" style="font-weight: 500; font-size: 13px; margin-bottom: 4px;"></div>
      <div style="display: flex; gap: 10px; font-size: 11px; color: #666;">
        <span><strong>Regular:</strong> $<span class="addon-regular-price">0.00</span></span>
        <span><strong>Addon Price:</strong> $<span class="addon-discount-price">0.00</span></span>
      </div>
    </div>
    <div style="display: flex; gap: 6px;">
      <button type="button" class="btn-addon-edit" style="background: #3498db; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px;" data-i18n="admin.edit">✎</button>
      <button type="button" class="btn-addon-remove" style="background: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px;" data-i18n="admin.delete">✕</button>
    </div>
  </div>
</template>

<!-- Template: Addon Selector Modal -->
<template id="addon-selector-modal-template">
  <div class="modal-content" style="max-width: 500px;">
    <div class="modal-header">
      <h2 data-i18n="admin.select-addon">Select Add-on Item</h2>
      <button type="button" class="modal-close" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #333;">✕</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom: 12px;">
        <input type="text" class="addon-search-input" placeholder="Search items..." style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;" />
      </div>
      <div class="addon-items-selector" style="border: 1px solid #ddd; border-radius: 4px; max-height: 300px; overflow-y: auto; background: #f9f9f9;">
        <!-- Items rendered here -->
      </div>
      <div class="addon-price-section" style="margin-top: 12px; display: none;">
        <label style="display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px;">Addon Discount Price (cents)</label>
        <input type="number" class="addon-price-input" placeholder="Enter discount price" value="0" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;" />
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-primary addon-confirm-select" style="display: none;" data-i18n="admin.confirm">✓ Confirm</button>
      <button type="button" class="btn-secondary addon-cancel-select" data-i18n="admin.cancel">Cancel</button>
    </div>
  </div>
</template>

<!-- Template: Variant View (Read-only) -->
<template id="variant-view-template">
  <div class="food-panel-variant-item">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <div class="food-panel-variant-name"></div>
    </div>
    <div class="food-panel-variant-options">
      <!-- Options rendered here -->
    </div>
  </div>
</template>

<!-- Template: Variant Edit (with delete buttons) -->
<template id="variant-edit-template">
  <div class="food-panel-variant-item" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <div style="flex: 1;">
        <div class="food-panel-variant-name" style="cursor: pointer;"></div>
      </div>
      <div style="display: flex; gap: 4px;">
        <button class="btn-tertiary variant-edit-btn" style="font-size: 12px; padding: 4px 8px;"><img src="/uploads/website/pencil.png" alt="edit" style="width: 14px; height: 14px;"/></button>
        <button class="btn-danger variant-delete-btn" style="padding: 4px 8px;"><img src="/uploads/website/bin.png" alt="delete" style="width: 14px; height: 14px;"/></button>
      </div>
    </div>
    <div class="food-panel-variant-options">
      <!-- Options rendered here -->
    </div>
  </div>
</template>

<!-- Template: Variant Inline Edit Form -->
<template id="variant-inline-edit-template">
  <div style="padding: 8px; border: 2px solid #2C3E50; border-radius: 4px; background: #f5f5f5;">
    <div style="margin-bottom: 8px;">
      <label style="display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px;" data-i18n="admin.variant-name">Variant Name</label>
      <input class="inline-variant-name" type="text" style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px;" />
    </div>
    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
      <div style="flex: 1;">
        <label style="display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px;" data-i18n="admin.variant-min-select">Min Select</label>
        <input class="inline-variant-min" type="number" min="0" style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px;" />
      </div>
      <div style="flex: 1;">
        <label style="display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px;" data-i18n="admin.variant-max-select">Max Select</label>
