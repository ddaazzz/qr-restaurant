<!-- ================= ADMIN ORDERS HTML ================= -->

<div class="orders-container">
    <!-- Category Sidebar (Left on mobile, hidden on desktop) -->
    <div id="orders-category-sidebar" class="orders-category-sidebar">
      <!-- Categories rendered by JS -->
    </div>
            <!-- History list view (when history button clicked) -->
        <div id="orders-history-left-view" class="orders-history-view">
          <h4 data-i18n="admin.order-history">Order History</h4>
          
          <!-- Order History Filter Tabs -->
          <div id="orders-history-filters" style="display: flex; gap: 4px; margin-bottom: 12px; padding: 0 12px; border-bottom: 1px solid #e0e0e0; overflow-x: auto;">
            <button onclick="setOrderHistoryFilter('all')" class="history-filter-tab active" data-filter="all" style="flex-shrink: 0; padding: 8px 12px; background: none; border: none; border-bottom: 3px solid #667eea; color: #667eea; cursor: pointer; font-weight: 600; font-size: 13px; white-space: nowrap;">
              <span data-i18n="admin.all-orders">All Orders</span>
            </button>

          </div>
          
          <div id="orders-history-list-left">
            <p data-i18n="admin.loading">Loading...</p>
          </div>
        </div>
    <!-- Main Content + Right Panel Wrapper (Flex Row) -->
    <div class="left-column-wrapper">
      <!-- Main Content Area -->
      <div class="orders-main-wrapper">
        <!-- Menu items view (default) -->
        <div id="orders-menu-items-view" class="orders-menu-view">
          <div id="orders-menu-items">
            <!-- JS renders menu items here -->
          </div>
        </div>
        


        <!-- Cart Bar (Bottom of main content) -->
        <div class="orders-cart-bar">
          <button id="cart-toggle-btn" class="cart-toggle-btn" onclick="toggleCartPanel()">
            <span data-i18n="admin.cart">Cart</span> (<span id="cart-item-count">0</span>)
          </button>
        </div>

        <!-- Category Tabs (Bottom of main wrapper on desktop) -->
        <div id="orders-category-tabs" class="orders-category-tabs-bottom">
          <!-- Categories rendered by JS -->
        </div>
      </div>

      <!-- Cart Panel (Hidden by default, shown on cart button click) -->
      <div class="orders-right-panel" id="orders-cart-view-container">
        <div id="orders-cart-view" class="cart-panel">
          <div class="cart-header">
            <h3 data-i18n="admin.cart">Cart</h3>
            <div style="display: flex; gap: 8px;">
              <button id="cart-edit-btn" class="btn-tertiary" onclick="toggleCartEdit()"><img src="/uploads/website/pencil.png" alt="edit"/> <span data-i18n="admin.edit">Edit</span></button>
              <button class="cart-close-btn" onclick="toggleCartPanel()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #666; padding: 0; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;">✕</button>
            </div>
          </div>

          <div class="cart-items-container">
            <div id="cart-items-list">
              <p data-i18n="admin.cart-is-empty">Cart is empty</p>
            </div>
          </div>

          <div class="cart-footer">
            <div class="cart-total">
              <span data-i18n="admin.total">Total:</span>
              <span id="cart-total-price">$0.00</span>
            </div>

            <div id="order-status-display">
              <span data-i18n="admin.status-label">Status:</span>
              <span id="order-status-value"></span>
            </div>

            <div class="order-type-selector">
              <label class="order-type-option">
                <input type="radio" name="order-type" id="order-type-table" value="table" onchange="updateOrderTypeUI()">
                <span data-i18n="admin.add-to-table">Add to Table</span>
              </label>
              <label class="order-type-option">
                <input type="radio" name="order-type" id="order-type-pay" value="pay-now" onchange="updateOrderTypeUI()">
                <span data-i18n="admin.order-now">Order Now</span>
              </label>
              <label class="order-type-option">
                <input type="radio" name="order-type" id="order-type-togo" value="to-go" onchange="updateOrderTypeUI()">
                <span data-i18n="admin.to-go">To Go</span>
              </label>
            </div>

            <div id="table-selection-ui">
              <label data-i18n="admin.select-table">Select Table:</label>
              <select id="order-table-select" data-i18n-placeholder="admin.select-table-placeholder">
                <option value="" data-i18n="admin.select-table-placeholder">-- Select a table --</option>
              </select>
            </div>

            <button id="order-submit-btn" onclick="submitOrder()" class="btn-primary" data-i18n="admin.submit-order">
              Submit Order
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Language initialization script -->
    <script>
      (function() {
        console.log('[admin-orders.html] Module loaded - initializing language');
        const currentLang = localStorage.getItem('language') || 'zh';
        if (typeof setLanguage === 'function') {
          setLanguage(currentLang);
          console.log('[admin-orders.html] Language set to:', currentLang);
        }
        if (typeof reTranslateContent === 'function') {
          reTranslateContent();
          console.log('[admin-orders.html] Content re-translated');
        }
      })();
    </script>

    <!-- Order Details View (Shown when history order is selected) -->
    <div id="orders-details-view" class="orders-details-view">
      <div class="details-header">
        <h3 id="order-details-title" data-i18n="admin.order-header">Order Details</h3>
        <button id="details-close-btn" class="details-close-btn" onclick="closeDetailsView()" data-i18n="admin.back">← Back</button>
      </div>
      <div id="order-details-content">
        <p data-i18n="admin.select-an-order">Select an order to view details</p>
      </div>
    </div>

    <!-- ============= TEMPLATES FOR SESSION AND ORDER DETAILS ============= -->
    
    <!-- Session Details Template -->
    <template id="session-details-template">
      <div style="margin-bottom: 20px;">
        <div style="background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px;">
          <!-- Session Header -->
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0;">
            <div>
              <div style="font-size: 12px; color: #666;" data-i18n="admin.session-label">Session</div>
              <div style="font-size: 18px; font-weight: 700; color: #2c3e50; margin-top: 2px;" class="session-label">Table 1</div>
            </div>
            <div style="text-align: right;">
              <div style="font-size: 11px; color: #666;"><span data-i18n="admin.session-id">ID:</span> <span class="session-id">1</span></div>
              <div style="font-size: 12px; font-weight: 600; color: #667eea; margin-top: 4px;">👥 <span class="session-pax">1</span> <span data-i18n="admin.session-people">people</span></div>
            </div>
          </div>
          
          <!-- Session Times -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; padding: 12px; background: #f9f9f9; border-radius: 6px;">
            <div>
              <div style="font-size: 11px; color: #666; margin-bottom: 2px;" data-i18n="admin.session-started">Started</div>
              <div style="font-size: 12px; font-weight: 600; color: #333;" class="session-start-time">Now</div>
            </div>
            <div>
              <div style="font-size: 11px; color: #666; margin-bottom: 2px;" data-i18n="admin.session-duration">Duration</div>
              <div style="font-size: 12px; font-weight: 600; color: #333;"><span class="session-duration">0</span> <span data-i18n="admin.minutes">minutes</span></div>
            </div>
          </div>
          
          <!-- Orders Count -->
          <div style="padding: 12px; background: #f0f7ff; border-left: 4px solid #667eea; border-radius: 4px; margin-bottom: 16px;">
            <div style="font-size: 12px; font-weight: 600; color: #667eea;">📦 <span class="session-order-count">0</span> <span data-i18n="admin.orders-count">order(s) in this session</span></div>
            <div style="font-size: 11px; color: #666; margin-top: 4px;"><span class="session-item-count">0</span> <span data-i18n="admin.items">items</span> • <span data-i18n="admin.total">Total:</span> $<span class="session-total-price">0.00</span></div>
          </div>
          
          <!-- Items List -->
          <div style="margin-bottom: 16px;">
            <div style="font-size: 12px; font-weight: 600; color: #333; margin-bottom: 10px;" data-i18n="admin.items-in-session">Items in Session:</div>
            <div style="max-height: 400px; overflow-y: auto;">
              <div class="session-items-list">
                <p style="color: #999; font-size: 12px;" data-i18n="admin.no-items-session">No items in this session</p>
              </div>
            </div>
          </div>
          
          <!-- Total -->
          <div style="padding: 12px; background: #f0f0f0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div style="font-weight: 600; color: #333;" data-i18n="admin.session-total">Session Total:</div>
            <div style="font-size: 18px; font-weight: 700; color: #667eea;">$<span class="session-total-display">0.00</span></div>
          </div>
          
          <!-- Action Buttons -->
          <div style="display: flex; gap: 8px; margin-bottom: 12px;">
            <button class="session-print-btn" style="
              flex: 1;
              padding: 10px;
              background: #3b82f6;
              color: white;
              border: none;
              border-radius: 6px;
              font-weight: 600;
              font-size: 12px;
              cursor: pointer;
              transition: all 0.2s;
            " onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#3b82f6'" data-i18n="admin.print-button">
              🖨️ Print
            </button>
            <button class="session-email-btn" style="
              flex: 1;
              padding: 10px;
              background: #8b5cf6;
              color: white;
              border: none;
              border-radius: 6px;
              font-weight: 600;
              font-size: 12px;
              cursor: pointer;
              transition: all 0.2s;
            " onmouseover="this.style.background='#6d28d9'" onmouseout="this.style.background='#8b5cf6'" data-i18n="admin.email-button">
              📧 Email
            </button>
          </div>
          
          <!-- Close Bill Button -->
          <div class="session-button-container">
            <!-- Will be populated with either close or closed button -->
          </div>
        </div>
      </div>
    </template>

    <!-- Customer Details Modal (To-Go order creation & edit customer) -->
    <div id="customer-details-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10000;justify-content:center;align-items:center;">
      <div style="background:#fff;border-radius:12px;padding:24px;width:90%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <h3 id="customer-modal-title" style="margin:0 0 16px;font-size:16px;font-weight:700;color:#1f2937;">Customer Details</h3>
        <div style="position:relative;margin-bottom:12px;">
          <label style="font-size:12px;color:#6b7280;font-weight:600;display:block;margin-bottom:4px;">Name *</label>
          <input type="text" id="customer-modal-name" autocomplete="off" placeholder="Search or type name…"
            style="width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;box-sizing:border-box;outline:none;"
            oninput="onCustomerModalNameInput(this.value)">
          <div id="customer-modal-suggestions" style="display:none;position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid #d1d5db;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:100;max-height:160px;overflow-y:auto;margin-top:2px;"></div>
        </div>
        <div style="margin-bottom:20px;">
          <label style="font-size:12px;color:#6b7280;font-weight:600;display:block;margin-bottom:4px;">Phone</label>
          <input type="text" id="customer-modal-phone" placeholder="Phone number"
            style="width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;box-sizing:border-box;outline:none;">
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="cancelCustomerModal()" style="flex:1;padding:10px;background:#e5e7eb;color:#374151;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:14px;">Cancel</button>
          <button onclick="confirmCustomerModal()" style="flex:1;padding:10px;background:#667eea;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:14px;">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Close Containers -->
    </div>
    </div>
