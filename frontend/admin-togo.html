<!-- ================= ADMIN TO-GO ORDERS HTML ================= -->

<div class="togo-container">

  <!-- Header row: title + QR code button -->
  <div class="togo-header-bar">
    <h3 class="togo-header-title">🍱 Pick-up Orders</h3>
    <button class="togo-qr-icon-btn" id="togo-qr-header-btn" onclick="openToGoQRModal()" title="Show To-Go QR Code">
      <img src="/uploads/website/qrcode.png" alt="QR" style="width:20px;height:20px;"> <span>QR Code</span>
    </button>
  </div>

  <!-- Two-column layout: list on left, details on right -->
  <div class="togo-body">

    <!-- Left: Order List -->
    <div class="togo-list-panel" id="togo-list-panel">
      <div class="togo-list-controls">
        <button class="togo-filter-btn active" data-filter="active" onclick="setToGoFilter('active')">Active</button>
        <button class="togo-filter-btn" data-filter="ready" onclick="setToGoFilter('ready')">Ready ✓</button>
        <button class="togo-filter-btn" data-filter="all" onclick="setToGoFilter('all')">All Today</button>
      </div>
      <div id="togo-order-list">
        <p class="togo-empty-msg">Loading orders…</p>
      </div>
    </div>

    <div class="togo-detail-panel" id="togo-detail-panel">
      <div class="togo-detail-placeholder" id="togo-detail-placeholder">
        <div style="text-align:center; color:#9ca3af; padding:48px 24px;">

          <div style="font-size:15px; font-weight:600; color:#6b7280;">Select an order to view details</div>
        </div>
      </div>
      <div id="togo-detail-content" style="display:none;"></div>
    </div>

  </div>

</div>

<!-- QR Code Modal -->
<div id="togo-qr-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:10000; justify-content:center; align-items:center;">
  <div style="background:#fff; border-radius:14px; padding:28px 32px; max-width:360px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h3 style="margin:0; font-size:16px; font-weight:700; color:#1f2937;">Takeaway Order QR</h3>
      <button onclick="closeToGoQRModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280;line-height:1;">✕</button>
    </div>
    <p style="font-size:13px; color:#6b7280; margin:0 0 16px;">Customers scan this to place takeaway orders directly.</p>
    <div id="togo-qrcode" style="display:inline-block; padding:12px; background:white; border:2px solid #667eea; border-radius:8px; margin-bottom:16px;"></div>
    <div style="font-size:11px; color:#9ca3af; margin-bottom:16px; word-break:break-all;" id="togo-qr-url-display"></div>
    <div style="display:flex; gap:8px; justify-content:center;">
      <button onclick="downloadToGoQR()" style="padding:8px 18px; background:#667eea; color:white; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600;">Download</button>
      <button onclick="closeToGoQRModal()" style="padding:8px 18px; background:#e5e7eb; color:#374151; border:none; border-radius:6px; cursor:pointer; font-size:13px;">Close</button>
    </div>
  </div>
