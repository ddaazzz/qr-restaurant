<div class="users-container" style="padding: 20px; max-width: 900px; margin: 0 auto;">

  <!-- Tab Bar -->
  <div class="users-tab-bar">
    <button class="users-tab-btn active" data-tab="users" onclick="switchUsersTab('users')">👥 Users</button>
    <button class="users-tab-btn" data-tab="restaurants" onclick="switchUsersTab('restaurants')">🏪 Restaurants</button>
  </div>

  <!-- Users Tab -->
  <div id="users-tab-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <h3 style="margin: 0; font-size: 18px; font-weight: 700;">All Users</h3>
      <div style="display: flex; gap: 8px;">
        <button onclick="openUserModal(null)" class="btn-primary" style="padding: 8px 16px; font-size: 14px;">+ Add User</button>
      </div>
    </div>
    <div id="users-list" class="users-list">
      <p style="color: #999; text-align: center; padding: 20px;">Loading...</p>
    </div>
  </div>

  <!-- Restaurants Tab -->
  <div id="restaurants-tab-content" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <h3 style="margin: 0; font-size: 18px; font-weight: 700;">All Restaurants</h3>
      <button id="create-restaurant-btn" onclick="openRestaurantModal(null)" class="btn-primary" style="padding: 8px 16px; font-size: 14px; display: none;">+ Add Restaurant</button>
    </div>
    <div id="restaurants-list" class="users-list">
      <p style="color: #999; text-align: center; padding: 20px;">Loading...</p>
    </div>
  </div>
</div>

<!-- User Modal -->
<div id="user-modal" class="modal-overlay" style="display: none;">
  <div class="modal-content" style="width: 480px; max-width: 95vw;">
    <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3 id="user-modal-title" style="margin: 0;">Create User</h3>
      <button onclick="closeUserModal()" style="font-size: 22px; background: none; border: none; cursor: pointer; color: #999;">✕</button>
    </div>

    <div id="user-modal-error" style="display: none; background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 14px;"></div>

    <!-- Role Picker -->
    <div style="margin-bottom: 16px;">
      <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 8px;">Role</label>
      <div class="users-role-picker" style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button class="role-chip active" data-role="staff" onclick="selectUserRole('staff')" style="padding: 6px 14px; border-radius: 20px; border: 1px solid #d1d5db; cursor: pointer; font-size: 13px; font-weight: 500;">Staff</button>
        <button class="role-chip" data-role="kitchen" onclick="selectUserRole('kitchen')" style="padding: 6px 14px; border-radius: 20px; border: 1px solid #d1d5db; cursor: pointer; font-size: 13px; font-weight: 500;">Kitchen</button>
        <button id="role-admin-chip" class="role-chip" data-role="admin" onclick="selectUserRole('admin')" style="padding: 6px 14px; border-radius: 20px; border: 1px solid #d1d5db; cursor: pointer; font-size: 13px; font-weight: 500; display: none;">Admin</button>
        <button id="role-superadmin-chip" class="role-chip" data-role="superadmin" onclick="selectUserRole('superadmin')" style="padding: 6px 14px; border-radius: 20px; border: 1px solid #d1d5db; cursor: pointer; font-size: 13px; font-weight: 500; display: none;">Superadmin</button>
      </div>
    </div>

    <!-- Name -->
    <div style="margin-bottom: 14px;">
      <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Name *</label>
      <input type="text" id="user-form-name" class="modal-input" placeholder="Full name" style="width: 100%; box-sizing: border-box;">
    </div>

    <!-- Email / Password (admin roles) -->
    <div id="user-form-email-section">
      <div style="margin-bottom: 14px;">
        <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Email</label>
        <input type="email" id="user-form-email" class="modal-input" placeholder="email@example.com" style="width: 100%; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 14px;">
        <label id="user-form-password-label" style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Password *</label>
        <input type="password" id="user-form-password" class="modal-input" placeholder="Min 8 characters" style="width: 100%; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 14px;">
        <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Confirm Password</label>
        <input type="password" id="user-form-confirm-password" class="modal-input" placeholder="Repeat password" style="width: 100%; box-sizing: border-box;">
      </div>
    </div>

    <!-- PIN (staff/kitchen roles) -->
    <div id="user-form-pin-section" style="display: none;">
      <div style="margin-bottom: 14px;">
        <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">PIN *</label>
        <input type="text" id="user-form-pin" class="modal-input" placeholder="4–6 digit PIN" maxlength="6" style="width: 100%; box-sizing: border-box;">
      </div>
    </div>

    <!-- Hourly Rate -->
    <div style="margin-bottom: 14px;">
      <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Hourly Rate (optional)</label>
      <input type="number" id="user-form-hourly-rate" class="modal-input" placeholder="e.g. 60.00" min="0" step="0.01" style="width: 100%; box-sizing: border-box;">
    </div>

    <!-- Restaurant (superadmin only) -->
    <div id="user-form-restaurant-section" style="display: none; margin-bottom: 14px;">
      <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Restaurant</label>
      <select id="user-form-restaurant" class="modal-input" style="width: 100%; box-sizing: border-box;"></select>
    </div>

    <div class="modal-button-group" style="display: flex; gap: 10px; margin-top: 20px;">
      <button onclick="closeUserModal()" class="modal-cancel-btn" style="flex: 1;">Cancel</button>
      <button id="user-save-btn" onclick="saveUser()" class="modal-btn-primary" style="flex: 1;">Create User</button>
    </div>
  </div>
</div>

<!-- Restaurant Modal -->
<div id="restaurant-modal" class="modal-overlay" style="display: none;">
  <div class="modal-content" style="width: 480px; max-width: 95vw;">
    <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3 id="restaurant-modal-title" style="margin: 0;">Create Restaurant</h3>
      <button onclick="closeRestaurantModal()" style="font-size: 22px; background: none; border: none; cursor: pointer; color: #999;">✕</button>
    </div>

    <div id="restaurant-modal-error" style="display: none; background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 14px;"></div>

    <div style="margin-bottom: 14px;">
      <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Restaurant Name *</label>
      <input type="text" id="restaurant-form-name" class="modal-input" placeholder="My Restaurant" style="width: 100%; box-sizing: border-box;">
    </div>
    <div style="margin-bottom: 14px;">
      <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Address</label>
      <input type="text" id="restaurant-form-address" class="modal-input" placeholder="123 Example St" style="width: 100%; box-sizing: border-box;">
    </div>
    <div style="margin-bottom: 14px;">
      <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Phone</label>
      <input type="text" id="restaurant-form-phone" class="modal-input" placeholder="+852 1234 5678" style="width: 100%; box-sizing: border-box;">
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px;">
      <div>
        <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Service Charge %</label>
        <input type="number" id="restaurant-form-sc" class="modal-input" value="10" min="0" max="100" step="0.5" style="width: 100%; box-sizing: border-box;">
      </div>
      <div>
        <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Language</label>
        <select id="restaurant-form-language" class="modal-input" style="width: 100%; box-sizing: border-box;">
          <option value="en">English</option>
          <option value="zh">Chinese</option>
        </select>
      </div>
    </div>
    <div style="margin-bottom: 14px;">
      <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Timezone</label>
      <select id="restaurant-form-timezone" class="modal-input" style="width: 100%; box-sizing: border-box;">
        <option value="Asia/Hong_Kong">Asia/Hong_Kong</option>
        <option value="Asia/Shanghai">Asia/Shanghai</option>
        <option value="Asia/Singapore">Asia/Singapore</option>
        <option value="Asia/Tokyo">Asia/Tokyo</option>
        <option value="UTC">UTC</option>
      </select>
    </div>

    <div class="modal-button-group" style="display: flex; gap: 10px; margin-top: 20px;">
      <button onclick="closeRestaurantModal()" class="modal-cancel-btn" style="flex: 1;">Cancel</button>
      <button id="restaurant-save-btn" onclick="saveRestaurant()" class="modal-btn-primary" style="flex: 1;">Create Restaurant</button>
    </div>
  </div>
</div>

<!-- Subscription Edit Modal -->
<div id="subscription-modal" class="modal-overlay" style="display: none;" onclick="if(event.target===this)closeSubscriptionModal()">
  <div class="modal-box" style="max-width: 420px; width: 90%;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;">
      <h3 id="sub-modal-title" style="margin: 0; font-size: 18px;">Subscription</h3>
      <button onclick="closeSubscriptionModal()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #9ca3af;">✕</button>
    </div>
    <div id="sub-save-error" style="display: none; background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 14px;"></div>

    <div style="margin-bottom: 14px;">
      <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Tier</label>
      <select id="sub-tier" class="modal-input" style="width: 100%; box-sizing: border-box;" onchange="updateSubscriptionModalVisibility()">
        <option value="trial">Trial</option>
        <option value="premium">Premium (Paid)</option>
        <option value="free">Free</option>
        <option value="expired">Expired</option>
      </select>
    </div>

    <div id="sub-trial-section">
      <div style="margin-bottom: 14px;">
        <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Trial End Date</label>
        <input type="date" id="sub-trial-end" class="modal-input" style="width: 100%; box-sizing: border-box;">
      </div>
    </div>

    <div id="sub-premium-section" style="display: none;">
      <div style="margin-bottom: 14px;">
        <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Plan</label>
        <select id="sub-plan" class="modal-input" style="width: 100%; box-sizing: border-box;">
          <option value="monthly">Monthly</option>
          <option value="annually">Annually</option>
        </select>
      </div>
      <div style="margin-bottom: 14px;">
        <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">Start Date</label>
        <input type="date" id="sub-start-date" class="modal-input" style="width: 100%; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 14px;">
        <label style="display: block; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px;">End Date</label>
        <input type="date" id="sub-end-date" class="modal-input" style="width: 100%; box-sizing: border-box;">
      </div>
    </div>

    <div class="modal-button-group" style="display: flex; gap: 10px; margin-top: 20px;">
      <button onclick="closeSubscriptionModal()" class="modal-cancel-btn" style="flex: 1;">Cancel</button>
      <button onclick="saveSubscription()" class="modal-btn-primary" style="flex: 1;">Save</button>
    </div>
  </div>
</div>
