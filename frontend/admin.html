<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Chuio Admin Portal">
  <link rel="icon" type="image/png" href="/uploads/chuio/V2/App%20Icon%20B%26W.png">
  <title>Admin Portal | Chuio</title>

  <!-- QR code library (generate QRs) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <!-- QR code scanner library (scan QRs) - UMD build -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>

  <!-- Admin CSS (Core + Modules) -->
  <link rel="stylesheet" href="/admin.css" />
  <link rel="stylesheet" href="/admin-orders.css?v=20260416h" />
  <link rel="stylesheet" href="/admin-tables.css" />
  <link rel="stylesheet" href="/admin-menu.css" />
  <link rel="stylesheet" href="/admin-staff.css" />
  <link rel="stylesheet" href="/admin-reports.css?v=20260416h" />
  <link rel="stylesheet" href="/admin-settings.css?v=20260416h" />
  <link rel="stylesheet" href="/admin-bookings.css" />
  <link rel="stylesheet" href="/admin-users.css" />
</head>

<body>

  <!-- ================= LOADING SCREEN (shown while language preference loads) ================= -->
  <div id="loading-splash" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999;">
    <div style="text-align: center;">
      <div style="font-size: 48px; margin-bottom: 20px;"></div>
      <div style="font-size: 18px; color: #666;">Loading...</div>
    </div>
  </div>

  <!-- ================= MAIN APP (hidden until login) ================= -->
  <div id="app-container" class="app-container" style="display: none;">
    <!-- HEADER with collapsible menu toggle, section title, and admin dropdown -->
    <header class="app-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        </div>
        
        <div class="header-center">
        </div>
        
        <div class="header-right">
          <button id="table-edit-btn" class="btn-primary" onclick="toggleTableEditMode()" style="display: none;"><img src="/uploads/website/pencil.png" alt="edit" class="btn-icon"> <span data-i18n="admin.header-edit">Edit</span></button>
          <button id="menu-edit-btn" class="btn-primary" onclick="toggleMenuEditMode()" style="display: none;"><img src="/uploads/website/pencil.png" alt="edit" class="btn-icon"> <span data-i18n="admin.header-edit">Edit</span></button>
          <button id="staff-edit-btn" class="btn-primary" onclick="toggleStaffEditMode('staff')" style="display: none;"><img src="/uploads/website/pencil.png" alt="edit" class="btn-icon"> <span data-i18n="admin.header-edit">Edit</span></button>
          <button id="reports-btn" class="btn-primary" style="display: none;"><img src="/uploads/website/report.png" alt="reports" class="btn-icon"> <span data-i18n="admin.header-reports">Reports</span></button>
          <button id="edit-settings-header" class="btn-primary" onclick="enterEditMode()" style="display: none;"><img src="/uploads/website/pencil.png" alt="edit" class="btn-icon"> <span data-i18n="admin.header-edit">Edit</span></button>
          <button id="orders-history-header-btn" class="btn-tertiary" onclick="toggleOrdersHistoryMode()" style="display: none;"><img src="/uploads/website/history.png" alt="history" class="btn-icon"/> <span data-i18n="admin.header-history">History</span></button>
          <button id="scan-qr-btn" class="btn-secondary" onclick="openScanQRModal()" style="display: none;"><img src="/uploads/website/qrcode.png" alt="scan" class="btn-icon" style="width: 16px; height: 16px;"> <span data-i18n="admin.scan-qr">Scan Table</span></button>
          <button id="header-new-booking-btn" class="btn-primary" onclick="openNewBookingModal()" style="display: none;"><img src="/uploads/website/bookings.png" alt="booking" class="btn-icon"> <span data-i18n="admin.new-booking">+ New Booking</span></button>
          <button id="admin-menu-btn" class="admin-menu-btn" onclick="toggleAdminDropdown()">
            <img src="/uploads/website/user.png" alt="admin" class="btn-icon"> <span data-i18n="admin.header-admin">Admin</span>
            <span class="dropdown-arrow">▼</span>
          </button>
          <div id="admin-dropdown" class="admin-dropdown hidden">
            <div id="superadmin-restaurant-list" style="display: none; padding: 10px; border-bottom: 1px solid #ddd; max-height: 300px; overflow-y: auto;"></div>
            <button class="dropdown-item" onclick="handleLogout()" data-i18n="admin.header-logout">🚪 Logout</button>
          </div>
        </div>
      </header>

      <!-- SIDEBAR NAVIGATION (collapsible) -->
      <nav class="sidebar collapsed" id="sidebar">
        <div class="sidebar-menu">
          <button class="menu-btn" data-section="orders" onclick="switchSection('orders')">
            <img src="/uploads/website/order.png" alt="orders" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.orders">Orders</span>
          </button>
          <button class="menu-btn active" data-section="tables" onclick="switchSection('tables')">
            <img src="/uploads/website/table.png" alt="tables" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.tables">Tables</span>
          </button>
          <button class="menu-btn" data-section="menu" onclick="switchSection('menu')" id="menu-nav-btn">
            <img src="/uploads/website/menu.png" alt="menu" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.menu">Menu</span>
          </button>
          <button class="menu-btn" data-section="staff" onclick="switchSection('staff')" id="staff-nav-btn">
            <img src="/uploads/website/teamwork.png" alt="staff" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.staff">Staff</span>
          </button>
          <button class="menu-btn" data-section="bookings" onclick="switchSection('bookings')" id="bookings-nav-btn">
            <img src="/uploads/website/bookings.png" alt="bookings" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.bookings">Bookings</span>
          </button>
          <button class="menu-btn" data-section="reports" onclick="switchSection('reports')" id="reports-nav-btn">
            <img src="/uploads/website/report.png" alt="reports" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.reports">Reports</span>
          </button>
          <button class="menu-btn" data-section="settings" onclick="switchSection('settings')" id="settings-nav-btn">
            <img src="/uploads/website/settings.png" alt="settings" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.settings">More</span>
          </button>
          <button class="menu-btn superadmin-only" data-section="users" onclick="switchSection('users')" id="users-nav-btn" style="display: none;">
            <span class="icon" style="font-size: 18px;">👥</span>
            <span class="menu-text" data-i18n="admin.users-restaurants">Users & Restaurants</span>
          </button>
        </div>
        
        <div class="sidebar-footer">
          <div class="sidebar-trademark">chuio.io</div>
        </div>
      </nav>
      <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

      <!-- MAIN CONTENT -->
      <main class="main-content">

        <!-- ================= ORDERS SECTION ================= -->
        <section id="section-orders" class="content-section admin-only">
          <!-- Orders container will be loaded here -->
        </section>

        <!-- ================= TABLES SECTION (DEFAULT) ================= -->
        <section id="section-tables" class="content-section active">
          <!-- Tables content loaded dynamically from admin-tables.html -->
        </section>

        <!-- ================= MENU MANAGEMENT SECTION ================= -->
        <section id="section-menu" class="content-section admin-only">
          <!-- Menu content loaded dynamically from admin-menu.html -->
        </section>

        <!-- ================= STAFF MANAGEMENT SECTION ================= -->
        <section id="section-staff" class="content-section admin-only">
          <!-- Staff content loaded dynamically from admin-staff.html -->
        </section>

        <!-- ================= BOOKINGS MANAGEMENT SECTION ================= -->
        <section id="section-bookings" class="content-section admin-only">
          <!-- Bookings content loaded dynamically from admin-bookings.html -->
        </section>

        <!-- ================= REPORTS SECTION ================= -->
        <section id="section-reports" class="content-section admin-only">
          <!-- Reports dynamically loaded from admin-reports.html -->
        </section>

        <!-- ================= SETTINGS SECTION ================= -->
        <section id="section-settings" class="content-section admin-only">
          <!-- Settings content loaded dynamically from admin-settings.html -->
        </section>

        <!-- ================= USERS & RESTAURANTS SECTION ================= -->
        <section id="section-users" class="content-section admin-only superadmin-only">
          <div style="padding: 20px;">
            <!-- Tab buttons -->
            <div class="users-tab-bar">
              <button class="users-tab-btn active" data-tab="users" onclick="switchUsersTab('users')" data-i18n="admin.users">Users</button>
              <button class="users-tab-btn" data-tab="restaurants" onclick="switchUsersTab('restaurants')" data-i18n="admin.restaurants">Restaurants</button>
            </div>

            <!-- Users tab -->
            <div id="users-tab-content">
              <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
                <button class="btn-primary" onclick="openUserModal()" style="font-size: 13px;">+ Create User</button>
              </div>
              <div id="users-list" class="users-list"></div>
            </div>

            <!-- Restaurants tab -->
            <div id="restaurants-tab-content" style="display: none;">
              <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
                <button class="btn-primary" id="create-restaurant-btn" onclick="openRestaurantModal()" style="font-size: 13px;">+ Create Restaurant</button>
              </div>
              <div id="restaurants-list" class="users-list"></div>
            </div>
          </div>
        </section>

      </main>
    </div>

    <!-- ================= USER MODAL ================= -->
    <div id="user-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
          <h3 id="user-modal-title">Create User</h3>
          <button class="modal-close" onclick="closeUserModal()">✕</button>
        </div>
        <div class="modal-body">
          <div id="user-modal-error" style="display: none; background: #fef2f2; color: #dc2626; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 12px;"></div>
          <div class="form-group"><label id="user-form-password-label" style="display: block; margin-bottom: 8px; font-weight: 600;">Name</label><input id="user-form-name" type="text" placeholder="Full name" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></div>
          <div id="user-form-email-section" class="form-group" style="display: none;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">Email</label>
            <input id="user-form-email" type="email" placeholder="Email address" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
          </div>
          <div id="user-form-password-section" class="form-group" style="display: none;">
            <label id="user-form-password-label" style="display: block; margin-bottom: 8px; font-weight: 600;">Password *</label>
            <input id="user-form-password" type="password" placeholder="Password" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            <input id="user-form-confirm-password" type="password" placeholder="Confirm password" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-top: 8px;">
          </div>
          <div id="user-form-pin-section" class="form-group" style="display: none;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">PIN</label>
            <input id="user-form-pin" type="text" placeholder="6-digit PIN" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
          </div>
          <div class="form-group" style="margin-bottom: 12px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">Role</label>
            <div class="users-role-picker" style="display: flex; gap: 8px; flex-wrap: wrap;">
              <button class="role-chip" data-role="superadmin" onclick="selectUserRole('superadmin')" style="padding: 8px 12px; border: 2px solid #ccc; background: white; border-radius: 6px; cursor: pointer; font-weight: 600;" id="role-superadmin-chip" style="display: none;">Super Admin</button>
              <button class="role-chip" data-role="admin" onclick="selectUserRole('admin')" style="padding: 8px 12px; border: 2px solid #ccc; background: white; border-radius: 6px; cursor: pointer; font-weight: 600;" id="role-admin-chip" style="display: none;">Admin</button>
              <button class="role-chip" data-role="staff" onclick="selectUserRole('staff')" style="padding: 8px 12px; border: 2px solid #4a90e2; background: #4a90e2; color: white; border-radius: 6px; cursor: pointer; font-weight: 600; active">Staff</button>
              <button class="role-chip" data-role="kitchen" onclick="selectUserRole('kitchen')" style="padding: 8px 12px; border: 2px solid #ccc; background: white; border-radius: 6px; cursor: pointer; font-weight: 600;">Kitchen</button>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 12px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">Hourly Rate ($)</label>
            <input id="user-form-hourly-rate" type="number" placeholder="0.00" step="0.01" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
          </div>
          <div id="user-form-restaurant-section" class="form-group" style="display: none;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">Restaurant</label>
            <select id="user-form-restaurant" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></select>
          </div>
        </div>
        <div class="modal-footer" style="display: flex; gap: 8px; padding: 12px; border-top: 1px solid #ddd;">
          <button onclick="closeUserModal()" class="btn-secondary" style="flex: 1; padding: 8px;">Cancel</button>
          <button id="user-save-btn" onclick="saveUser()" class="btn-primary" style="flex: 1; padding: 8px;">Create User</button>
        </div>
      </div>
    </div>

    <!-- ================= RESTAURANT MODAL ================= -->
    <div id="restaurant-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
          <h3 id="restaurant-modal-title">Create Restaurant</h3>
          <button class="modal-close" onclick="closeRestaurantModal()">✕</button>
        </div>
        <div class="modal-body">
          <div id="restaurant-modal-error" style="display: none; background: #fef2f2; color: #dc2626; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 12px;"></div>
          <div class="form-group"><label style="display: block; margin-bottom: 8px; font-weight: 600;">Restaurant Name</label><input id="restaurant-form-name" type="text" placeholder="Restaurant name" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></div>
          <div class="form-group"><label style="display: block; margin-bottom: 8px; font-weight: 600;">Address</label><input id="restaurant-form-address" type="text" placeholder="Address" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></div>
          <div class="form-group"><label style="display: block; margin-bottom: 8px; font-weight: 600;">Phone</label><input id="restaurant-form-phone" type="text" placeholder="Phone number" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></div>
          <div class="form-group"><label style="display: block; margin-bottom: 8px; font-weight: 600;">Timezone</label><input id="restaurant-form-timezone" type="text" placeholder="e.g., Asia/Hong_Kong" value="UTC" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></div>
          <div class="form-group"><label style="display: block; margin-bottom: 8px; font-weight: 600;">Service Charge (%)</label><input id="restaurant-form-sc" type="number" placeholder="0" step="0.1" value="0" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></div>
        </div>
        <div class="modal-footer" style="display: flex; gap: 8px; padding: 12px; border-top: 1px solid #ddd;">
          <button onclick="closeRestaurantModal()" class="btn-secondary" style="flex: 1; padding: 8px;">Cancel</button>
          <button id="restaurant-save-btn" onclick="saveRestaurant()" class="btn-primary" style="flex: 1; padding: 8px;">Create Restaurant</button>
        </div>
      </div>
    </div>

    <!-- QR Scanner Modal -->
    <div id="scan-qr-modal" class="modal hidden">
      <div class="modal-overlay" onclick="closeScanQRModal()"></div>
      <div class="modal-content qr-scanner-modal">
        <div class="modal-header">
          <h3 data-i18n="admin.scan-table-qr">Scan Table QR Code</h3>
          <button class="modal-close" onclick="closeScanQRModal()">✕</button>
        </div>
        <div class="qr-scanner-container">
          <div id="qr-reader" style="width: 100%; max-width: 400px; margin: 0 auto; border-radius: 8px; overflow: hidden;"></div>
          <div id="qr-scanner-error" class="qr-scanner-error hidden" style="color: #ef4444; margin-top: 10px; text-align: center; white-space: pre-wrap; font-size: 13px; line-height: 1.5; padding: 10px;"></div>
          <div id="qr-scanner-retry" class="hidden" style="margin-top: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <button class="btn-primary" onclick="startQRScanning()" style="background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 200px;">Retry Camera</button>
            <button onclick="location.reload()" style="background: #6b7280; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 200px; font-size: 14px;">↺ Reload Page</button>
          </div>
          <div id="qr-scanner-loading" class="qr-scanner-loading hidden" style="color: #666; margin-top: 10px; text-align: center;">Initializing camera...</div>
        </div>
        <div class="modal-footer" style="margin-top: 20px;">
          <button class="btn-secondary" onclick="closeScanQRModal()" data-i18n="admin.close">Close</button>
        </div>
      </div>
    </div>

  <!-- ================= SCRIPTS ================= -->
  <script src="/translations.js"></script>
  <script src="/timezone-utils.js"></script>
  <script src="/printer-routing.js"></script>
  <!-- Socket.IO for real-time WebSocket events -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <!-- Auto-print WebSocket client for real-time session detection -->
  <script src="/auto-print-websocket.js"></script>
  <script src="/admin.js"></script>
  <!-- Modular admin functions -->
  <script src="/admin-orders.js?v=20260416h"></script>
  <script src="/admin-tables.js"></script>
  <script src="/admin-menu.js"></script>
  <script src="/admin-staff.js"></script>
  <script src="/admin-reports.js?v=20260416h"></script>
  <script src="/admin-settings.js?v=20260416h"></script>
  <script src="/admin-settings-presets.js"></script>
  <script src="/admin-printer.js"></script>
  <script src="/admin-bookings.js"></script>
  <script src="/admin-users.js?v=20260417a"></script>
  <!-- QR scanning functionality -->
  <script src="/qr-scanner.js"></script>
</body>
</html>
