<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>Forgot Password - Chuio</title>
  <link rel="icon" type="image/png" href="/uploads/chuio/V2/App%20Icon%20B%26W.png">
  <link rel="apple-touch-icon" href="/uploads/chuio/V2/App%20Icon%20B%26W.png" />
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="language-switcher.css" />
  <link rel="stylesheet" href="login.css" />
  <style>
    .success-msg { text-align: center; color: var(--success-color); font-weight: 500; font-size: 14px; margin-top: 8px; display: none; }
    .back-link { text-align: center; margin-top: 20px; font-size: 14px; }
    .back-link a { color: var(--primary-color); text-decoration: none; font-weight: 600; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="glass-nav">
    <div class="nav-container">
      <a href="home.html" class="logo">
        <img src="/uploads/chuio/V2/App%20Icon%20B%26W.png" alt="Chuio Logo" />
        <div class="logo-text">
          <span class="logo-name">Chuio</span>
          <span class="logo-sub">All-in-One Restaurant Manager</span>
        </div>
      </a>
      <div></div>
      <div class="nav-actions">
        <a href="login.html" class="nav-login-btn">← Login</a>
        <div data-language-picker></div>
      </div>
    </div>
  </nav>

  <main>
    <div class="login-container">
      <div class="login-header">
        <h1>Forgot Password</h1>
        <p>Enter your email and we'll send you a reset link</p>
      </div>

      <form id="forgotForm" class="login-form">
        <div id="error"></div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="your@email.com" required autocomplete="email" />
        </div>

        <button type="submit" class="login-btn" id="submitBtn">Send Reset Link</button>

        <div class="success-msg" id="successMsg">
          If an account exists with that email, a password reset link has been sent. Please check your inbox.
        </div>
      </form>

      <div class="back-link">
        <a href="login.html">← Back to Login</a>
      </div>
    </div>
  </main>

  <footer>
    <div style="max-width: 1200px; margin: 0 auto;">
      <p style="margin: 0; font-size: 14px;">&copy; 2026 Chuio. All rights reserved.</p>
    </div>
  </footer>

  <script src="translations.js"></script>
  <script src="language-switcher.js"></script>
  <script>
    var API_BASE = window.location.origin;

    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var errorEl = document.getElementById('error');
      var successEl = document.getElementById('successMsg');
      var btn = document.getElementById('submitBtn');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!email) {
        errorEl.innerText = 'Please enter your email';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');

      try {
        var res = await fetch(API_BASE + '/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });
        await res.json();
        // Always show success to prevent email enumeration
        successEl.style.display = 'block';
        btn.textContent = 'Email Sent';
      } catch (err) {
        errorEl.innerText = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
