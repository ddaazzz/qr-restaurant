<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/uploads/chuio/favicon%20(1).ico">
  <title>Kitchen Dashboard | Chuio</title>
  <link rel="stylesheet" href="kitchen.css" />
  <link rel="stylesheet" href="/language-switcher.css" />
  
  <!-- Translations -->
  <script src="/translations.js"></script>
  <script src="/language-switcher.js"></script>
  
  <!-- Socket.IO for real-time WebSocket events -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <!-- Printer Support -->
  <script src="/printer-routing.js"></script>
  <script src="kitchen-printing.js"></script>
  <script src="/kitchen-order-websocket.js"></script>
</head>
<body>

  <!-- ================= LOGIN SCREEN ================= -->
  <div id="login-screen" class="login-screen">
    <div class="login-container">
      <div class="login-header">
        <img src="/uploads/chuio/chuio_logo.png" alt="Chuio Logo" />
        <h1 data-i18n="kitchen.title">🍳 Kitchen Dashboard</h1>
        <p data-i18n="kitchen.enter-pin">Enter PIN to continue</p>
      </div>

      <div id="pin-login">
        <div id="pin-dots" class="pin-dots">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="keypad">
          <button onclick="pressKey(1)">1</button>
          <button onclick="pressKey(2)">2</button>
          <button onclick="pressKey(3)">3</button>

          <button onclick="pressKey(4)">4</button>
          <button onclick="pressKey(5)">5</button>
          <button onclick="pressKey(6)">6</button>

          <button onclick="pressKey(7)">7</button>
          <button onclick="pressKey(8)">8</button>
          <button onclick="pressKey(9)">9</button>

          <button class="clear" onclick="clearPin()">⌫</button>
          <button onclick="pressKey(0)">0</button>
          <button class="enter" onclick="submitPin()">⏎</button>
        </div>

        <div id="error-message" class="error-message"></div>
      </div>
    </div>
  </div>

  <!-- ================= KITCHEN APP ================= -->
  <div id="kitchen-app" class="kitchen-app">
    <div class="kitchen-header">
      <h1 data-i18n="kitchen.title">🍳 Kitchen Dashboard</h1>
      <div class="kitchen-header-right">
        <button id="admin-menu-btn" class="admin-menu-btn" onclick="toggleAdminDropdown()" style="margin-right: 10px;">
          <img src="/uploads/website/user.png" alt="menu" class="btn-icon"> Menu
          <span class="dropdown-arrow">▼</span>
        </button>
        <div id="admin-dropdown" class="admin-dropdown hidden">
          <div class="dropdown-item lang-selector-dropdown">
            <label style="display: block; padding: 10px 15px; font-weight: 500; border-bottom: 1px solid #ddd;">Language</label>
            <button id="lang-en" class="lang-btn" onclick="setLanguage('en'); toggleAdminDropdown()">English</button>
            <button id="lang-zh" class="lang-btn" onclick="setLanguage('zh'); toggleAdminDropdown()">中文</button>
          </div>
          <button class="dropdown-item" onclick="handleLogout()" data-i18n="kitchen.logout">🚪 Logout</button>
        </div>
      </div>
    </div>

    <div class="kitchen-content">
      <div id="orders-container" class="orders-container">
        <p class="no-orders" data-i18n="kitchen.loading">Loading orders...</p>
      </div>
    </div>
  </div>

  <script src="kitchen.js"></script>
  <script>
    // Initialize translations and language switcher for kitchen
    document.addEventListener('DOMContentLoaded', () => {
      new LanguageSwitcher();
    });
  </script>

</body>
</html>
