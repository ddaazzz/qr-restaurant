<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chuio - Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/uploads/chuio/V2/App%20Icon%20B%26W.png">
  <!-- Translations -->
  <script src="/translations.js"></script>
  <!-- Landing styles -->
  <link rel="stylesheet" href="/landing.css?v=20260513a" />
  <!-- Language Switcher Styles -->
  <link rel="stylesheet" href="/language-switcher.css" />
  <!-- Menu styles -->
  <link rel="stylesheet" href="/menu.css?v=20260512a" />
  <!-- QR Code scanner (used for customer table-scan from order-now mode) -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>
</head>

<body>
<div id="phone-frame">

  <!-- ================= LANDING PAGE ================= -->
  <div id="landing-page" class="landing">

    <!-- ── HERO SECTION ─────────────────────────────── -->
    <div id="landing-hero" class="landing-hero">
      <!-- Top bar: language switcher -->
      <div class="landing-hero-top">
        <div class="language-switcher-landing">
          <button class="lang-btn lang-btn-en" onclick="setLanguageFromMenu('en')" data-lang="en" title="English">EN</button>
          <button class="lang-btn lang-btn-zh" onclick="setLanguageFromMenu('zh')" data-lang="zh" title="中文">中</button>
        </div>
      </div>

      <!-- Bottom of hero: logo + name + badge -->
      <div class="landing-hero-bottom">
        <img id="logo" class="landing-logo" />
        <h2 id="restaurantName"></h2>
        <p id="address"></p>
        <div id="xish-hero-badge" class="xish-hero-badge" style="display:none">✦ XISH Partner</div>
      </div>
    </div>

    <!-- ── BOTTOM CARD ───────────────────────────────── -->
    <div id="landing-card" class="landing-card">

      <!-- XISH member bar (shown when member is logged in) -->
      <div id="xish-member-bar" class="xish-member-bar-card" style="display:none"></div>

      <!-- Primary actions: Dine In + Pick Up -->
      <div class="landing-action-row">
        <button id="dine-in-btn" class="landing-action-btn">
          <span class="action-emoji">🍽</span>
          <span class="action-label-main">堂食</span>
          <span class="action-label-sub">DINE IN</span>
        </button>
        <button id="togo-btn" class="landing-action-btn">
          <span class="action-emoji">🥡</span>
          <span class="action-label-main">自提</span>
          <span class="action-label-sub">PICK UP</span>
        </button>
      </div>

      <!-- Transaction Record (secondary) -->
      <button id="check-orders-btn" class="landing-secondary-btn">
        <span class="secondary-icon">📋</span>
        <span data-i18n="menu.check-orders">Transaction Record</span>
      </button>

      <!-- XISH loyalty section (revealed by JS when xish_enabled) -->
      <div id="xish-landing-section" class="xish-landing-section" style="display:none">
        <div class="xish-section-divider">
          <span class="xish-divider-line"></span>
          <span class="xish-divider-label">✦ XISH Membership</span>
          <span class="xish-divider-line"></span>
        </div>
        <div class="xish-action-row">
          <button class="xish-action-btn" id="my-points-btn" onclick="openXishTab('points')">
            <span class="xish-act-icon">⭐</span>
            <span class="xish-act-label">My Points</span>
          </button>
          <button class="xish-action-btn" id="coupons-btn" onclick="openXishTab('coupons')">
            <span class="xish-act-icon">🎟</span>
            <span class="xish-act-label">Coupons</span>
          </button>
          <button class="xish-action-btn" id="gift-cards-btn" onclick="openXishTab('gifts')">
            <span class="xish-act-icon">🎁</span>
            <span class="xish-act-label">Gift Cards</span>
          </button>
        </div>
      </div>

    </div><!-- /.landing-card -->

    <!-- Hidden data elements still written to by JS -->
    <p id="tableInfo" style="display:none"></p>
    <p id="phone"     style="display:none"></p>

  </div><!-- /#landing-page -->

  <!-- ================= CUSTOMER TABLE SCAN PANEL ================= -->
  <!-- Shown when user taps "Order for Table" from an order-now QR -->
  <div id="table-scan-overlay" class="table-scan-overlay">
    <div class="table-scan-panel">
      <div class="table-scan-header">
        <span class="table-scan-title">📍 Scan Table QR</span>
        <button class="table-scan-close-btn" onclick="closeTableScanPanel()">✕</button>
      </div>
      <p class="table-scan-hint">Point your camera at the QR code on your table</p>
      <div id="table-scan-reader"></div>
      <div id="table-scan-status" class="table-scan-status" style="display:none"></div>
      <div id="table-scan-error" class="table-scan-error" style="display:none"></div>
    </div>
  </div>

  <!-- ================= MENU APP (HIDDEN INITIALLY) ================= -->
  <div id="app" style="display:none;">

    <!-- Header -->
    <div class="app-header">
      <!-- Back button — shown when orders/payment screen is active -->
      <button id="header-back-btn" class="header-back-btn" style="display:none" onclick="headerBackAction()">‹</button>
      <span id="header-page-title" class="header-page-title" style="display:none"></span>

      <!-- Normal menu header -->
      <span id="table-indicator"></span>

      <div id="search-container">
        <input type="text" id="search-input" placeholder="🔍 Search…" oninput="filterMenu(this.value)" autocomplete="off" />
      </div>

      <div class="header-right-menu">
        <div class="language-switcher-menu">
          <button class="lang-btn lang-btn-en" onclick="setLanguageFromMenu('en')" data-lang="en" title="English">EN</button>
          <button class="lang-btn lang-btn-zh" onclick="setLanguageFromMenu('zh')" data-lang="zh" title="中文">中</button>
        </div>
        <button id="orders-btn" title="Check Orders">🧾 Orders</button>
      </div>

      <!-- Table name shown in header right when orders drawer is active -->
      <span id="header-table-name" class="header-table-name" style="display:none"></span>
    </div>

    <!-- Main layout -->
    <div class="layout">
      <div id="categories"></div>
      <div id="menu"></div>
    </div>

    <!-- Cart bar -->
    <div id="cart-bar">
      <div class="cart-info">
        <span id="cart-count" data-i18n="menu.cart-count-label">0 items</span>
        <span id="cart-total" data-i18n="menu.cart-total-label">$0.00</span>
      </div>
      <button id="confirm-order-btn" data-i18n="menu.confirm-order" disabled>
        Confirm Order
      </button>
    </div>

    <!-- ================= DRAWERS & OVERLAY ================= -->
    <div id="drawer-overlay"></div>

    <div id="item-drawer">
      <div class="item-page-header">
        <button class="item-page-back" onclick="closeAllDrawers()">‹ Back</button>
      </div>
      <div class="drawer-content"></div>
    </div>

    <div id="cart-drawer">
      <div class="drawer-panel-header">
        <button class="drawer-back-btn" onclick="closeActiveDrawer()">‹</button>
        <span class="drawer-panel-title" data-i18n="menu.your-cart">Your Cart</span>
        <span class="drawer-panel-spacer"></span>
      </div>
      <div class="drawer-content" id="cart-drawer-content"></div>
    </div>

    <div id="orders-drawer">
      <div class="drawer-content" id="orders-drawer-content"></div>
    </div>

    <div id="payment-screen">
      <div id="payment-screen-content"></div>
    </div>

  </div><!-- #app -->

</div><!-- #phone-frame -->

  <!-- ================= SCRIPTS ================= -->
  <script src="/menu.js?v=20260513a" defer></script>

</body>
</html>
