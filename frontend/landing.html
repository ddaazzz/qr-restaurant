<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chuio - Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/uploads/chuio/V2/App%20Icon%20B%26W.png">
  <script src="/translations.js"></script>
  <link rel="stylesheet" href="/landing.css?v=20260516a" />
  <link rel="stylesheet" href="/language-switcher.css" />
  <link rel="stylesheet" href="/menu.css?v=20260516a" />
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div id="phone-frame">


  <!-- HOME TAB -->
  <div id="home-tab" class="main-tab active-tab">
    <div id="home-cover" class="home-cover">
      <div class="home-cover-overlay"></div>
      <div class="home-cover-logo-wrap">
        <img id="logo" class="home-logo" />
        <div class="home-cover-name" id="home-cover-name"></div>
      </div>
      <div id="home-banners" class="home-banners" style="display:none"></div>
    </div>
    <div class="home-scroll">
      <!-- Info strip with hours -->
      <div id="home-info-strip" class="home-info-strip">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="home-info-name" class="home-info-name"></span>
        <span id="home-info-sep" class="home-info-sep">·</span>
        <span id="home-info-hours" class="home-info-hours"></span>
        <button class="home-info-more-btn" id="home-info-more-btn" onclick="toggleHomeInfoExpand()">
          更多 <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="home-info-chevron"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div id="home-info-expand" class="home-info-expand" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="home-info-address"></span>
      </div>

      <!-- Order type cards -->
      <div class="home-order-cards" id="home-order-cards">
        <button class="home-order-card" id="home-dine-btn">
          <span class="hoc-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h2v11h2V2H3z"/><path d="M18 2v20h-2v-8h-3V6c0-2.2 1.8-4 4-4z"/></svg>
          </span>
          <span class="hoc-label-zh">堂食</span>
          <span class="hoc-label-en">DINE IN</span>
        </button>
        <button class="home-order-card" id="home-pickup-btn">
          <span class="hoc-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          </span>
          <span class="hoc-label-zh">外帶</span>
          <span class="hoc-label-en">PICK UP</span>
        </button>
      </div>

      <!-- XISH Membership card -->
      <div id="home-membership-card" class="home-membership-card" style="display:none">
        <div class="hmc-bg"></div>
        <div class="hmc-content">
          <div class="hmc-left">
            <div class="hmc-tier" id="hmc-tier">MEMBER</div>
            <div class="hmc-name" id="hmc-name">—</div>
            <div class="hmc-counts">
              <div class="hmc-count-item" onclick="openMyCouponsPanel()">
                <span class="hmc-count-num" id="hmc-coupon-count">0</span>
                <span class="hmc-count-label">優惠券</span>
              </div>
              <div class="hmc-count-divider"></div>
              <div class="hmc-count-item" onclick="openMyPointsPanel()">
                <span class="hmc-count-num" id="hmc-stamp-count">0</span>
                <span class="hmc-count-label">積分</span>
              </div>
            </div>
          </div>
          <div class="hmc-right">
            <button class="hmc-qr-btn" onclick="showMemberQR()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 20h3"/></svg>
              <span>我的QR</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Queue placeholder -->
      <div id="home-queue-section" class="home-quick-section" style="display:none">
        <div class="hqs-inner">
          <div class="hqs-icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="19"/><rect x="10" y="8" width="5" height="14"/><rect x="17" y="13" width="5" height="9"/></svg>
          </div>
          <div class="hqs-text">
            <div class="hqs-title">在線取號</div>
            <div class="hqs-sub">即時取號，按時到來，按位就座</div>
          </div>
          <svg class="hqs-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>

      <!-- Pre-order placeholder -->
      <div id="home-preorder-section" class="home-quick-section" style="display:none">
        <div class="hqs-inner">
          <div class="hqs-icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14" stroke-width="3"/><line x1="12" y1="14" x2="12" y2="14" stroke-width="3"/><line x1="8" y1="18" x2="8" y2="18" stroke-width="3"/></svg>
          </div>
          <div class="hqs-text">
            <div class="hqs-title">預選菜品</div>
            <div class="hqs-sub">提前點好菜單，落座後快速確認</div>
          </div>
          <svg class="hqs-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>

      <!-- Featured items -->
      <div id="home-featured-section" class="home-featured-section" style="display:none">
        <div class="home-featured-header">
          <span class="home-featured-title">精選推薦</span>
          <button class="home-featured-more" onclick="switchMainTab('menu')">查看更多 ›</button>
        </div>
        <div id="home-featured-scroll" class="home-featured-scroll"></div>
      </div>

      <!-- Transaction record -->
      <button id="check-orders-btn" class="landing-secondary-btn">
        <span class="secondary-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg></span>
        <span>交易記錄 · Transaction Record</span>
      </button>

      <!-- Loyalty quick-access (shown when member is logged in) -->
      <div id="xish-landing-section" class="loyalty-quick-row" style="display:none">
        <button class="loyalty-quick-btn" id="my-points-btn" onclick="openMyPointsPanel()">
          <span class="lqb-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
          <span class="lqb-count" id="lqb-points-count">0</span>
          <span class="lqb-label-zh">積分</span>
          <span class="lqb-label-en">Points</span>
        </button>
        <button class="loyalty-quick-btn" id="coupons-btn" onclick="openMyCouponsPanel()">
          <span class="lqb-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 0 0-2 2v3a2 2 0 0 1 0 4v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3a2 2 0 0 1 0-4V7a2 2 0 0 0-2-2H5z"/></svg></span>
          <span class="lqb-count" id="lqb-coupons-count">0</span>
          <span class="lqb-label-zh">優惠券</span>
          <span class="lqb-label-en">Coupons</span>
        </button>
      </div>

      <div style="height: 80px;"></div>
    </div><!-- /.home-scroll -->

    <!-- Hidden elements still used by JS -->
    <p id="tableInfo" style="display:none"></p>
    <p id="phone" style="display:none"></p>
    <p id="restaurantName" style="display:none"></p>
    <p id="address" style="display:none"></p>
    <div id="xish-member-bar" style="display:none"></div>
    <div id="xish-hero-badge" style="display:none"></div>
  </div><!-- /#home-tab -->

  <!-- MENU TAB -->
  <div id="menu-tab" class="main-tab">
    <!-- Restaurant name row + lang/search -->
    <div class="menu-tab-header" id="menu-tab-header">
      <div class="mth-main">
        <div class="mth-restaurant-name" id="mth-restaurant-name"></div>
        <div class="mth-info-row">
          <span class="mth-hours" id="mth-hours"></span>
          <span class="mth-sep" id="mth-sep">·</span>
          <span class="mth-order-type-badge" id="mth-order-type-badge"></span>
          <button class="mth-more-btn" id="mth-info-toggle" onclick="toggleMenuInfoExpand()">
            更多門店信息
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="mth-chevron"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
        <div id="mth-expand" class="mth-expand" style="display:none">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="mth-address"></span>
        </div>
      </div>
      <div class="mth-right">
        <button class="header-icon-btn" id="header-lang-btn" onclick="cycleHeaderLang()" title="Language">
          <span id="header-lang-label">中</span>
        </button>
        <button class="header-icon-btn" id="header-search-btn" onclick="toggleMenuSearch()" title="Search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
    </div>

    <!-- Featured items strip -->
    <div id="menu-featured-strip" class="menu-featured-strip" style="display:none">
      <div id="menu-featured-scroll" class="menu-featured-scroll"></div>
    </div>

    <!-- Search row -->
    <div id="menu-search-row" class="menu-search-row" style="display:none">
      <input type="text" id="search-input" placeholder="🔍 Search…" oninput="filterMenu(this.value)" autocomplete="off" />
    </div>

    <!-- Categories + menu -->
    <div class="layout">
      <div id="categories"></div>
      <div id="menu"></div>
    </div>

    <!-- Cart bar -->
    <div id="cart-bar">
      <div class="cart-info">
        <span id="cart-count" data-i18n="menu.cart-count-label">0 items</span>
        <span id="cart-total" data-i18n="menu.cart-total-label">$0.00</span>
      </div>
      <button id="confirm-order-btn" data-i18n="menu.confirm-order" disabled>Confirm Order</button>
    </div>
  </div><!-- /#menu-tab -->

  <!-- ORDERS TAB -->
  <div id="orders-tab" class="main-tab">
    <div class="simple-tab-header">
      <button class="sth-back" onclick="switchMainTab('home')" style="display:none"></button>
      <span class="sth-title">訂單 · Orders</span>
      <button class="header-icon-btn" id="header-history-btn" onclick="openOrderHistory()" title="History">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
    </div>
    <div id="orders-tab-content" class="orders-tab-content">
      <div class="tab-empty-state" id="orders-empty-state">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>暫無訂單</p>
        <span>No active orders</span>
      </div>
    </div>
  </div>

  <!-- PROFILE TAB -->
  <div id="profile-tab" class="main-tab">
    <div class="simple-tab-header">
      <span class="sth-title">我的 · Profile</span>
    </div>
    <div id="profile-tab-content" class="profile-tab-content"></div>
    <div style="height: 80px;"></div>
  </div><!-- /#profile-tab -->

  <!-- BOTTOM NAV (placed after tabs so it sits on top in DOM stacking order) -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bn-item active" id="bn-home" onclick="switchMainTab('home')">
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="bn-label" data-i18n="menu.nav-home">首頁</span>
    </button>
    <button class="bn-item" id="bn-menu" onclick="switchMainTab('menu')">
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h2v11h2V2H3z"/><path d="M18 2v20h-2v-8h-3V6c0-2.2 1.8-4 4-4z"/></svg>
      <span class="bn-badge" id="bn-menu-badge" style="display:none"></span>
      <span class="bn-label">Menu</span>
    </button>
    <button class="bn-item" id="bn-orders" onclick="switchMainTab('orders')">
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
      <span class="bn-badge" id="bn-orders-badge" style="display:none"></span>
      <span class="bn-label" data-i18n="menu.nav-orders">訂單</span>
    </button>
    <button class="bn-item" id="bn-profile" onclick="switchMainTab('profile')">
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="bn-label" data-i18n="menu.nav-profile">我的</span>
    </button>
  </nav>

  <!-- TABLE SCAN OVERLAY -->
  <div id="table-scan-overlay" class="table-scan-overlay">
    <div class="table-scan-panel">
      <div class="table-scan-header">
        <span class="table-scan-title">📍 Scan Table QR</span>
        <button class="table-scan-close-btn" onclick="closeTableScanPanel()">✕</button>
      </div>
      <p class="table-scan-hint">Point your camera at the QR code on your table</p>
      <div id="table-scan-reader"></div>
      <div id="table-scan-status" class="table-scan-status" style="display:none"></div>
      <div id="table-scan-error" class="table-scan-error" style="display:none"></div>
    </div>
  </div>

  <!-- ORDER TYPE PICKER OVERLAY (shown when user taps Order nav before ordering starts) -->
  <div id="order-type-overlay" class="order-type-overlay" style="display:none">
    <div class="order-type-panel">
      <button class="order-type-close-btn" onclick="_closeOrderTypeOverlay()">✕</button>
      <div class="order-type-title">How would you like to order?</div>
      <div class="order-type-buttons">
        <button class="order-type-btn" id="otp-btn-1">
          <span class="order-type-btn-main" id="otp-lbl1-main">堂食</span>
          <span class="order-type-btn-sub" id="otp-lbl1-sub">DINE IN</span>
        </button>
        <button class="order-type-btn" id="otp-btn-2">
          <span class="order-type-btn-main" id="otp-lbl2-main">外帶</span>
          <span class="order-type-btn-sub" id="otp-lbl2-sub">TAKEAWAY</span>
        </button>
      </div>
    </div>
  </div>

  <!-- SHARED DRAWERS -->
  <div id="drawer-overlay"></div>

  <div id="item-drawer" class="item-drawer-fullscreen">
    <div class="item-drawer-topbar">
      <button class="item-drawer-back-btn" onclick="closeAllDrawers()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <div class="item-drawer-scroll">
      <div class="drawer-content"></div>
    </div>
    <div class="item-drawer-footer" id="item-drawer-footer" style="display:none">
      <div class="idf-top">
        <span class="idf-price" id="idf-price"></span>
        <div class="idf-qty-row">
          <button class="idf-qty-btn idf-minus" onclick="changeDrawerQty(-1)">−</button>
          <span class="idf-qty" id="idf-qty">1</span>
          <button class="idf-qty-btn idf-plus" onclick="changeDrawerQty(1)">+</button>
        </div>
      </div>
      <div class="idf-options-summary" id="idf-options-summary"></div>
      <button class="idf-add-btn" id="idf-add-btn" onclick="addFromDrawer()">加入購物車</button>
    </div>
  </div>

  <div id="cart-drawer">
    <div class="drawer-panel-header">
      <button class="drawer-back-btn" onclick="closeActiveDrawer()">‹</button>
      <span class="drawer-panel-title" data-i18n="menu.your-cart">Your Cart</span>
      <span class="drawer-panel-spacer"></span>
    </div>
    <div class="drawer-content" id="cart-drawer-content"></div>
  </div>

  <div id="orders-drawer">
    <div class="drawer-content" id="orders-drawer-content"></div>
  </div>

  <div id="payment-screen">
    <div id="payment-screen-content"></div>
  </div>

  <!-- Member QR modal -->
  <div id="member-qr-modal" class="member-qr-modal" style="display:none" onclick="closeMemberQR()">
    <div class="mqr-card" onclick="event.stopPropagation()">
      <button class="mqr-close" onclick="closeMemberQR()">✕</button>
      <div class="mqr-tier" id="mqr-tier"></div>
      <div class="mqr-name" id="mqr-name"></div>
      <div id="mqr-qr-container" class="mqr-qr-container"></div>
      <div class="mqr-xish-id" id="mqr-xish-id"></div>
    </div>
  </div>

</div><!-- #phone-frame -->
<script src="/menu.js?v=20260516a" defer></script>
</body>
</html>
