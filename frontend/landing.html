<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chuio - Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/uploads/chuio/V2/App%20Icon%20B%26W.png">
  <!-- Translations -->
  <script src="/translations.js"></script>
  <!-- Landing styles -->
  <link rel="stylesheet" href="/landing.css?v=20260511c" />
  <!-- Language Switcher Styles -->
  <link rel="stylesheet" href="/language-switcher.css" />
  <!-- Menu styles -->
  <link rel="stylesheet" href="/menu.css?v=20260514a" />
  <!-- QR Code scanner (used for customer table-scan from order-now mode) -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>
</head>

<body>
<div id="phone-frame">

  <!-- ================= LANDING PAGE ================= -->
  <div id="landing-page" class="landing">

    <!-- ── HERO IMAGE ─────────────────────────────────── -->
    <div id="landing-hero" class="landing-hero">
      <div class="landing-hero-bottom">
        <img id="logo" class="landing-logo" />
        <h2 id="restaurantName"></h2>
        <p id="address"></p>
        <div id="xish-hero-badge" class="xish-hero-badge" style="display:none">✦ XISH Partner</div>
      </div>
    </div>

    <!-- ── SCROLLABLE CONTENT ─────────────────────────── -->
    <div id="landing-content" class="landing-content">

      <!-- XISH member bar (shown when member is logged in) -->
      <div id="xish-member-bar" class="xish-member-bar-card" style="display:none"></div>

      <!-- Primary actions -->
      <div class="landing-action-row">
        <button id="dine-in-btn" class="landing-action-btn">
          <span class="action-emoji">🍽</span>
          <span class="action-label-main">堂食</span>
          <span class="action-label-sub">ORDER FOR TABLE</span>
        </button>
        <button id="togo-btn" class="landing-action-btn">
          <span class="action-emoji">🥡</span>
          <span class="action-label-main">外帶</span>
          <span class="action-label-sub">TAKEAWAY</span>
        </button>
      </div>

      <!-- Transaction Record (hidden in order-now mode) -->
      <button id="check-orders-btn" class="landing-secondary-btn">
        <span class="secondary-icon">📋</span>
        <span class="landing-secondary-zh">交易記錄</span>
        <span class="landing-secondary-sep"> · </span>
        <span class="landing-secondary-en">Transaction Record</span>
      </button>

      <!-- XISH loyalty section (revealed by JS when xish_enabled) -->
      <div id="xish-landing-section" class="xish-landing-section" style="display:none">
        <div class="xish-section-divider">
          <span class="xish-divider-line"></span>
          <span class="xish-divider-label">✦ XISH</span>
          <span class="xish-divider-line"></span>
        </div>
        <div class="xish-action-row">
          <button class="xish-action-btn" id="my-points-btn" onclick="openXishTab('points')">
            <span class="xish-act-icon">⭐</span>
            <span class="xish-act-label-zh">積分</span>
            <span class="xish-act-label-en">My Points</span>
          </button>
          <button class="xish-action-btn" id="coupons-btn" onclick="openXishTab('coupons')">
            <span class="xish-act-icon">🎟</span>
            <span class="xish-act-label-zh">優惠券</span>
            <span class="xish-act-label-en">Coupons</span>
          </button>
          <button class="xish-action-btn" id="gift-cards-btn" onclick="openXishTab('gifts')">
            <span class="xish-act-icon">🎁</span>
            <span class="xish-act-label-zh">禮品卡</span>
            <span class="xish-act-label-en">Gift Cards</span>
          </button>
        </div>
      </div>

    </div><!-- /.landing-content -->

    <!-- Hidden data elements still written to by JS -->
    <p id="tableInfo" style="display:none"></p>
    <p id="phone"     style="display:none"></p>

  </div><!-- /#landing-page -->

  <!-- ================= CUSTOMER TABLE SCAN PANEL ================= -->
  <!-- Shown when user taps "Order for Table" from an order-now QR -->
  <div id="table-scan-overlay" class="table-scan-overlay">
    <div class="table-scan-panel">
      <div class="table-scan-header">
        <span class="table-scan-title">📍 Scan Table QR</span>
        <button class="table-scan-close-btn" onclick="closeTableScanPanel()">✕</button>
      </div>
      <p class="table-scan-hint">Point your camera at the QR code on your table</p>
      <div id="table-scan-reader"></div>
      <div id="table-scan-status" class="table-scan-status" style="display:none"></div>
      <div id="table-scan-error" class="table-scan-error" style="display:none"></div>
    </div>
  </div>

  <!-- ================= MENU APP (HIDDEN INITIALLY) ================= -->
  <div id="app" style="display:none;">

    <!-- Header -->
    <div class="app-header">
      <!-- Left: back to landing -->
      <button id="header-menu-btn" class="header-menu-btn" onclick="backToLanding()">
        <svg width="18" height="13" viewBox="0 0 18 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="0" y1="1.5" x2="18" y2="1.5"/>
          <line x1="0" y1="6.5" x2="18" y2="6.5"/>
          <line x1="0" y1="11.5" x2="18" y2="11.5"/>
        </svg>
      </button>
      <!-- Center: order type + sub-info -->
      <div class="header-order-info" id="header-order-info">
        <div class="header-order-type" id="header-order-type"></div>
        <div class="header-order-sub" id="header-order-sub"></div>
      </div>
      <!-- Right: icon buttons -->
      <div class="header-icons" id="header-icons">
        <button class="header-icon-btn" id="header-search-btn" onclick="toggleMenuSearch()" title="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="header-icon-btn" id="header-lang-btn" onclick="cycleHeaderLang()" title="Language">
          <span id="header-lang-label">中</span>
        </button>
        <button class="header-icon-btn" id="orders-btn" title="Orders">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </button>
        <button class="header-icon-btn" id="header-profile-btn" onclick="openXishOrJoin()" title="Profile">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
      <!-- Orders/payment mode overrides (shown instead of above) -->
      <button id="header-back-btn" class="header-back-btn" style="display:none" onclick="headerBackAction()">‹</button>
      <span id="header-page-title" class="header-page-title" style="display:none"></span>
      <span id="header-table-name" class="header-table-name" style="display:none"></span>
    </div>
    <!-- Collapsible search row (toggled by search icon) -->
    <div id="menu-search-row" class="menu-search-row" style="display:none">
      <input type="text" id="search-input" placeholder="🔍 Search…" oninput="filterMenu(this.value)" autocomplete="off" />
    </div>

    <!-- Main layout -->
    <div class="layout">
      <div id="categories"></div>
      <div id="menu"></div>
    </div>

    <!-- Cart bar -->
    <div id="cart-bar">
      <div class="cart-info">
        <span id="cart-count" data-i18n="menu.cart-count-label">0 items</span>
        <span id="cart-total" data-i18n="menu.cart-total-label">$0.00</span>
      </div>
      <button id="confirm-order-btn" data-i18n="menu.confirm-order" disabled>
        Confirm Order
      </button>
    </div>

    <!-- ================= DRAWERS & OVERLAY ================= -->
    <div id="drawer-overlay"></div>

    <div id="item-drawer">
      <div class="item-page-header">
        <button class="item-page-back" onclick="closeAllDrawers()">‹ Back</button>
      </div>
      <div class="drawer-content"></div>
    </div>

    <div id="cart-drawer">
      <div class="drawer-panel-header">
        <button class="drawer-back-btn" onclick="closeActiveDrawer()">‹</button>
        <span class="drawer-panel-title" data-i18n="menu.your-cart">Your Cart</span>
        <span class="drawer-panel-spacer"></span>
      </div>
      <div class="drawer-content" id="cart-drawer-content"></div>
    </div>

    <div id="orders-drawer">
      <div class="drawer-content" id="orders-drawer-content"></div>
    </div>

    <div id="payment-screen">
      <div id="payment-screen-content"></div>
    </div>

  </div><!-- #app -->

</div><!-- #phone-frame -->

  <!-- ================= SCRIPTS ================= -->
  <script src="/menu.js?v=20260514a" defer></script>

</body>
</html>
