<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>Login - Chuio Restaurant Management System</title>
  <link rel="icon" type="image/png" href="/uploads/chuio/V2/App%20Icon%20B%26W.png">
  <link rel="apple-touch-icon" href="/uploads/chuio/V2/App%20Icon%20B%26W.png" />
  <meta name="description" content="Login to your Chuio restaurant management account. Access your dashboard, orders, menu, and kitchen management tools.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#4a90e2">
  <link rel="canonical" href="https://chuio.io/login">
  <link rel="stylesheet" href="language-switcher.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <!-- NAVIGATION HEADER -->
  <nav class="glass-nav">
    <div class="nav-container">
      <a href="home.html" class="logo">
        <img src="/uploads/chuio/V2/App%20Icon%20B%26W.png" alt="Chuio Logo" />
        <div class="logo-text">
          <span class="logo-name">Chuio</span>
          <span class="logo-sub">All-in-One Restaurant Manager</span>
        </div>
      </a>
      <div></div>
      <div class="nav-actions">
        <a href="home.html" class="nav-login-btn" data-i18n="nav.back-home">← Home</a>
        <div data-language-picker></div>
      </div>
    </div>
  </nav>

  <!-- MAIN LOGIN FORM -->
  <main>
    <div class="login-container">
      <div class="login-header">
        <h1 data-i18n="login.title">Welcome Back</h1>
        <p data-i18n="login.subtitle">Sign in to manage your restaurant</p>
      </div>

      <form id="loginForm" class="login-form">
        <div id="error"></div>

        <div class="form-group">
          <label for="email" data-i18n="login.email">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="your@restaurant.com"
            data-i18n-placeholder="login.email-placeholder"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password" data-i18n="login.password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            data-i18n-placeholder="login.password-placeholder"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="login-btn" id="loginSubmitBtn" data-i18n="login.sign-in">
          Sign In
        </button>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
          <a href="forgot-password.html" style="font-size: 13px; color: #6b7280; text-decoration: none; font-weight: 500;" data-i18n="login.forgot-password">Forgot Password?</a>
          <a href="register.html" style="font-size: 13px; color: #f97316; text-decoration: none; font-weight: 600;" data-i18n="login.create-account">Create Account →</a>
        </div>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div style="max-width: 1200px; margin: 0 auto;">
      <p style="margin: 0; font-size: 14px;" data-i18n="footer.copyright">&copy; 2026 Chuio. All rights reserved.</p>
      <div class="footer-address">
        <p class="footer-address-title" data-i18n="footer.contact-address">Business Address</p>
        <p style="margin: 2px 0;" data-i18n="footer.address-line1">Flat G, 14/F Imperial Building</p>
        <p style="margin: 2px 0;" data-i18n="footer.address-line2">58 Canton Road, Tsim Sha Tsui</p>
        <p style="margin: 2px 0;" data-i18n="footer.address-line3">Hong Kong</p>
        <p style="margin: 8px 0;"><span data-i18n="footer.contact-phone">Phone</span>: +852 63433995</p>
        <p style="margin: 2px 0;"><span data-i18n="footer.contact-email">Email</span>: <a href="mailto:dta@chuio.io" style="color: #999; text-decoration: none;">dta@chuio.io</a></p>
      </div>
    </div>
  </footer>

  <script src="translations.js"></script>
  <script src="language-switcher.js"></script>
  <script src="mobile-menu.js"></script>
  <script src="login.js" defer></script>
</body>
</html>
