<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Queue</title>
  <link rel="icon" type="image/png" href="/uploads/chuio/V2/App%20Icon%20B%26W.png">
  <link rel="stylesheet" href="/queue.css?v=4" />
</head>
<body>

<div id="q-shell">

  <!-- ─── HERO HEADER ──────────────────────────────────── -->
  <div id="q-hero">
    <div id="q-hero-cover" class="q-hero-cover"></div>
    <div id="q-hero-overlay" class="q-hero-overlay"></div>
    <div id="q-hero-content" class="q-hero-content">
      <img id="q-logo" src="" alt="" class="q-logo" style="display:none" />
      <div id="q-restaurant-name" class="q-restaurant-name"></div>
    </div>
    <button id="q-lang-btn" class="q-lang-btn" onclick="qCycleLang()" title="Language">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span id="q-lang-label">中</span>
    </button>
  </div><!-- /#q-hero -->

  <!-- ─── STEP: Loading ───────────────────────────────── -->
  <div id="step-loading" class="q-step active">
    <div class="q-spinner"></div>
    <div class="q-step-sub" data-i18n="loading">Loading…</div>
  </div>

  <!-- ─── STEP: Queue closed ──────────────────────────── -->
  <div id="step-closed" class="q-step" style="display:none">
    <div class="q-icon-wrap">🚫</div>
    <div class="q-step-title" data-i18n="closed-title">Queue Not Active</div>
    <div class="q-step-sub" data-i18n="closed-sub">Online queuing is currently unavailable.</div>
  </div>

  <!-- ─── STEP: Pax keypad ────────────────────────────── -->
  <div id="step-pax" class="q-step" style="display:none">
    <div class="q-step-title" data-i18n="pax-title">幾位用餐？</div>
    <div class="q-step-sub" data-i18n="pax-sub">請輸入人數</div>

    <!-- Pax display -->
    <div id="q-pax-display" class="q-pax-display">—</div>

    <!-- Group hint (shown after pax entered) -->
    <div id="q-group-hint" class="q-group-hint" style="display:none"></div>

    <!-- Keypad -->
    <div class="q-keypad">
      <button class="q-key" onclick="qKeyPress('1')">1</button>
      <button class="q-key" onclick="qKeyPress('2')">2</button>
      <button class="q-key" onclick="qKeyPress('3')">3</button>
      <button class="q-key" onclick="qKeyPress('4')">4</button>
      <button class="q-key" onclick="qKeyPress('5')">5</button>
      <button class="q-key" onclick="qKeyPress('6')">6</button>
      <button class="q-key" onclick="qKeyPress('7')">7</button>
      <button class="q-key" onclick="qKeyPress('8')">8</button>
      <button class="q-key" onclick="qKeyPress('9')">9</button>
      <button class="q-key q-key-clear" onclick="qKeyClear()"><span data-i18n="clear">清除</span></button>
      <button class="q-key" onclick="qKeyPress('0')">0</button>
      <button class="q-key q-key-back" onclick="qKeyBackspace()">⌫</button>
    </div>

    <button class="q-btn q-btn-primary q-btn-confirm" id="q-confirm-pax-btn" onclick="qConfirmPax()" style="display:none">
      <span data-i18n="confirm">確認</span>
    </button>
  </div>

  <!-- ─── STEP: Contact form ──────────────────────────── -->
  <div id="step-contact" class="q-step q-step-form" style="display:none">
    <div class="q-step-title" data-i18n="contact-title">聯絡資料</div>
    <div class="q-step-sub" data-i18n="contact-sub">請填寫以下資料</div>
    <div class="q-form-body">
      <div id="contact-name-row" class="q-form-row" style="display:none">
        <label class="q-form-label" data-i18n="contact-name">姓名</label>
        <input type="text" id="q-contact-name" class="q-form-input" autocomplete="name" />
      </div>
      <div id="contact-phone-row" class="q-form-row" style="display:none">
        <label class="q-form-label" data-i18n="contact-phone">電話</label>
        <input type="tel" id="q-contact-phone" class="q-form-input" autocomplete="tel" inputmode="tel" />
      </div>
      <div id="contact-email-row" class="q-form-row" style="display:none">
        <label class="q-form-label" data-i18n="contact-email">電郵</label>
        <input type="email" id="q-contact-email" class="q-form-input" autocomplete="email" inputmode="email" />
      </div>
    </div>
    <div class="q-form-actions">
      <button class="q-btn q-btn-ghost" onclick="qBackToPax()"><span data-i18n="back">返回</span></button>
      <button class="q-btn q-btn-primary" onclick="qSubmitContact()"><span data-i18n="next">下一步</span></button>
    </div>
  </div>

  <!-- ─── STEP: Queue ticket ──────────────────────────── -->
  <div id="step-number" class="q-step" style="display:none">
    <div class="q-step-sub" data-i18n="your-number">您的取號</div>
    <div id="q-ticket-card" class="q-ticket-card">
      <div id="q-ticket-group" class="q-ticket-group">A</div>
      <div id="q-ticket-number" class="q-ticket-number">001</div>
    </div>
    <div class="q-ahead-wrap">
      <span id="q-ahead-count" class="q-ahead-count">0</span>
      <span class="q-ahead-label" data-i18n="ahead-label">組在您前面</span>
    </div>
    <div id="q-serving-wrap" class="q-serving-wrap" style="display:none">
      <span class="q-serving-label" data-i18n="now-serving">現正叫號</span>
      <span id="q-serving-number" class="q-serving-number">—</span>
    </div>
    <button class="q-btn q-btn-ghost q-cancel-btn" onclick="qCancelEntry()">
      <span data-i18n="cancel-queue">取消取號</span>
    </button>
  </div>

  <!-- ─── STEP: Seated ────────────────────────────────── -->
  <div id="step-seated" class="q-step" style="display:none">
    <div class="q-icon-wrap q-icon-success">✓</div>
    <div class="q-step-title" data-i18n="seated-title">入座成功！</div>
    <div class="q-step-sub" data-i18n="seated-sub">Enjoy your meal!</div>
  </div>

</div><!-- /#q-shell -->

<script src="/queue.js?v=4"></script>
</body>
</html>
