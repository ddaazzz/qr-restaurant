<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Chuio Staff Portal">
  <link rel="icon" type="image/x-icon" href="/uploads/chuio/favicon%20(1).ico">
  <title>Staff Portal | Chuio</title>

  <!-- QR code library (generate QRs) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <!-- QR code scanner library (scan QRs) - UMD build -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>

  <!-- Admin CSS (Core + Modules) -->
  <link rel="stylesheet" href="/admin.css" />
  <link rel="stylesheet" href="/admin-orders.css" />
  <link rel="stylesheet" href="/admin-tables.css" />
  <link rel="stylesheet" href="/admin-menu.css" />
  <link rel="stylesheet" href="/admin-staff.css" />
  <link rel="stylesheet" href="/admin-reports.css" />
  <link rel="stylesheet" href="/admin-settings.css" />
  <link rel="stylesheet" href="/admin-bookings.css" />

  <!-- Staff CSS (PIN entry + access control - must load LAST to override admin styles) -->
  <link rel="stylesheet" href="/staff.css" />
</head>

<body>

  <!-- ================= MAIN APP (hidden until PIN login) ================= -->
  <div id="app-container" class="app-container" style="display: none;">
    <!-- HEADER with collapsible menu toggle, section title, and staff dropdown -->
    <header class="app-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        </div>

        <div class="header-center">
        </div>

        <div class="header-right">
          <button id="table-edit-btn" class="btn-primary" onclick="toggleTableEditMode()" style="display: none;"><img src="/uploads/website/pencil.png" alt="edit" class="btn-icon"> <span data-i18n="admin.header-edit">Edit</span></button>
          <button id="menu-edit-btn" class="btn-primary" onclick="toggleMenuEditMode()" style="display: none;"><img src="/uploads/website/pencil.png" alt="edit" class="btn-icon"> <span data-i18n="admin.header-edit">Edit</span></button>
          <button id="staff-edit-btn" class="btn-primary" onclick="toggleStaffEditMode('staff')" style="display: none;"><img src="/uploads/website/pencil.png" alt="edit" class="btn-icon"> <span data-i18n="admin.header-edit">Edit</span></button>
          <button id="reports-btn" class="btn-primary" style="display: none;" data-i18n="admin.header-reports">∿ Reports</button>
          <button id="edit-settings-header" class="btn-primary" onclick="enterEditMode()" style="display: none;"><img src="/uploads/website/pencil.png" alt="edit" class="btn-icon"> <span data-i18n="admin.header-edit">Edit</span></button>
          <button id="orders-history-header-btn" class="btn-tertiary" onclick="toggleOrdersHistoryMode()" style="display: none;"><img src="/uploads/website/history.png" alt="history" style="width: 16px; height: 16px; filter: brightness(0) invert(1);"/> <span data-i18n="admin.header-history">History</span></button>
          <button id="header-new-booking-btn" class="btn-primary" onclick="openNewBookingModal()" style="display: none;" data-i18n="admin.new-booking">+ New Booking</button>
          <button id="scan-qr-btn" class="btn-secondary" onclick="openScanQRModal()" style="display: none;"><img src="/uploads/website/qrcode.png" alt="scan" class="btn-icon"> <span data-i18n="admin.scan-qr">Scan Table</span></button>
          <button id="clock-btn" class="btn-secondary" onclick="toggleClockInOut()" style="display: none;">⏱ Clock In</button>
          <button id="admin-menu-btn" class="admin-menu-btn" onclick="openStaffSwitcher()">
            <img src="/uploads/website/user.png" alt="exit" class="btn-icon"> <span data-i18n="admin.header-exit">Exit</span>
          </button>
        </div>
      </header>

      <!-- SIDEBAR NAVIGATION (collapsible) -->
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-menu">
          <button class="menu-btn" data-section="orders" onclick="switchSection('orders')" id="orders-nav-btn" data-feature="1">
            <img src="/uploads/website/order.png" alt="orders" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.orders">Orders</span>
          </button>
          <button class="menu-btn active" data-section="tables" onclick="switchSection('tables')" id="tables-nav-btn" data-feature="2">
            <img src="/uploads/website/table.png" alt="tables" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.tables">Tables</span>
          </button>
          <button class="menu-btn" data-section="menu" onclick="switchSection('menu')" id="menu-nav-btn" data-feature="3">
            <img src="/uploads/website/menu.png" alt="menu" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.menu">Menu</span>
          </button>
          <button class="menu-btn" data-section="staff" onclick="switchSection('staff')" id="staff-nav-btn" data-feature="4">
            <img src="/uploads/website/teamwork.png" alt="staff" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.staff">Staff</span>
          </button>
          <button class="menu-btn" data-section="bookings" onclick="switchSection('bookings')" id="bookings-nav-btn" data-feature="6">
            <img src="/uploads/website/bookings.png" alt="bookings" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.bookings">Bookings</span>
          </button>
          <button class="menu-btn" data-section="reports" onclick="switchSection('reports')" id="reports-nav-btn" data-feature="7">
            <img src="/uploads/website/report.png" alt="reports" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.reports">Reports</span>
          </button>
          <button class="menu-btn" data-section="settings" onclick="switchSection('settings')" id="settings-nav-btn" data-feature="5">
            <img src="/uploads/website/settings.png" alt="settings" class="icon">
            <span class="menu-text" data-i18n="admin.sidebar.settings">More</span>
          </button>
        </div>

        <div class="sidebar-footer">
          <div class="sidebar-trademark">chuio.io</div>
        </div>
      </nav>

      <!-- MAIN CONTENT -->
      <main class="main-content">

        <!-- ================= ORDERS SECTION ================= -->
        <section id="section-orders" class="content-section">
          <!-- Orders container will be loaded here -->
        </section>

        <!-- ================= TABLES SECTION (DEFAULT) ================= -->
        <section id="section-tables" class="content-section active">
          <!-- Tables content loaded dynamically from admin-tables.html -->
        </section>

        <!-- ================= MENU MANAGEMENT SECTION ================= -->
        <section id="section-menu" class="content-section">
          <!-- Menu content loaded dynamically from admin-menu.html -->
        </section>

        <!-- ================= STAFF MANAGEMENT SECTION ================= -->
        <section id="section-staff" class="content-section">
          <!-- Staff content loaded dynamically from admin-staff.html -->
        </section>

        <!-- ================= BOOKINGS MANAGEMENT SECTION ================= -->
        <section id="section-bookings" class="content-section">
          <!-- Bookings content loaded dynamically from admin-bookings.html -->
        </section>

        <!-- ================= REPORTS SECTION ================= -->
        <section id="section-reports" class="content-section">
          <!-- Reports dynamically loaded from admin-reports.html -->
        </section>

        <!-- ================= SETTINGS SECTION ================= -->
        <section id="section-settings" class="content-section">
          <!-- Settings content loaded dynamically from admin-settings.html -->
        </section>

      </main>
    </div>

  <!-- ================= PIN LOGIN SCREEN ================= -->
  <div id="login-screen" class="login-screen">
    <div class="login-container">
      <div class="login-header">
        <img src="/uploads/chuio/chuio_logo.png" alt="Chuio Logo" />
        <h1 data-i18n="staff.title">👨‍💼 Staff Dashboard</h1>
        <p data-i18n="staff.enter-pin">Enter PIN to continue</p>
      </div>

      <div id="pin-login">
        <div id="pin-dots" class="pin-dots">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="keypad">
          <button onclick="pressKey(1)">1</button>
          <button onclick="pressKey(2)">2</button>
          <button onclick="pressKey(3)">3</button>

          <button onclick="pressKey(4)">4</button>
          <button onclick="pressKey(5)">5</button>
          <button onclick="pressKey(6)">6</button>

          <button onclick="pressKey(7)">7</button>
          <button onclick="pressKey(8)">8</button>
          <button onclick="pressKey(9)">9</button>

          <button class="clear" onclick="clearPin()">⌫</button>
          <button onclick="pressKey(0)">0</button>
          <button class="enter" onclick="submitPin()">⏎</button>
        </div>

        <div id="error-message" class="error-message"></div>
      </div>
    </div>
  </div>

  <!-- QR Scanner Modal -->
  <div id="scan-qr-modal" class="modal hidden">
    <div class="modal-overlay" onclick="closeScanQRModal()"></div>
    <div class="modal-content qr-scanner-modal">
      <div class="modal-header">
        <h3 data-i18n="admin.scan-table-qr">Scan Table QR Code</h3>
        <button class="modal-close" onclick="closeScanQRModal()">✕</button>
      </div>
      <div class="qr-scanner-container">
        <div id="qr-reader" style="width: 100%; max-width: 400px; margin: 0 auto; border-radius: 8px; overflow: hidden;"></div>
        <div id="qr-scanner-error" class="qr-scanner-error hidden" style="color: #ef4444; margin-top: 10px; text-align: center; white-space: pre-wrap; font-size: 13px; line-height: 1.5; padding: 10px;"></div>
        <div id="qr-scanner-retry" class="hidden" style="margin-top: 15px; text-align: center;">
          <button class="btn-primary" onclick="startQRScanning()" style="background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">🔄 Retry Camera</button>
        </div>
        <div id="qr-scanner-loading" class="qr-scanner-loading hidden" style="color: #666; margin-top: 10px; text-align: center;">Initializing camera...</div>
      </div>
      <div class="modal-footer" style="margin-top: 20px;">
        <button class="btn-secondary" onclick="closeScanQRModal()" data-i18n="admin.close">Close</button>
      </div>
    </div>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <!-- ================= STAFF SWITCHER OVERLAY ================= -->
  <div id="staff-switcher" class="staff-switcher" style="display:none">
    <div class="staff-switcher-box">
      <div class="staff-switcher-header">
        <div>
          <h2 class="staff-switcher-title" data-i18n="admin.switcher-who">Who's working?</h2>
          <p class="staff-switcher-subtitle"><span data-i18n="admin.switcher-active">Active</span>: <strong id="switcher-logged-in-name"></strong></p>
        </div>
        <div class="staff-switcher-header-right">
          <div class="switcher-lang-row">
            <button id="lang-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
            <button id="lang-zh" class="lang-btn" onclick="setLanguage('zh')">中文</button>
          </div>
          <div class="switcher-action-row">
            <button class="btn-secondary" onclick="closeStaffSwitcher()">← Back</button>
            <button class="btn-danger" onclick="staffLogout()" data-i18n="admin.header-logout">🚪 Logout</button>
          </div>
        </div>
      </div>
      <!-- Grid view -->
      <div id="switcher-grid-view">
        <div id="switcher-staff-grid" class="switcher-staff-grid"></div>
      </div>
      <!-- PIN view -->
      <div id="switcher-pin-view" style="display:none">
        <div class="switcher-pin-header">
          <button class="btn-secondary" onclick="backToSwitcherGrid()">← Back</button>
          <div class="switcher-pin-who">
            <div id="switcher-pin-avatar" class="switcher-avatar-lg"></div>
            <div id="switcher-pin-name" class="switcher-pin-name-label"></div>
          </div>
        </div>
        <div class="pin-dots" id="switcher-pin-dots">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="keypad">
          <button onclick="switcherPressKey(1)">1</button>
          <button onclick="switcherPressKey(2)">2</button>
          <button onclick="switcherPressKey(3)">3</button>
          <button onclick="switcherPressKey(4)">4</button>
          <button onclick="switcherPressKey(5)">5</button>
          <button onclick="switcherPressKey(6)">6</button>
          <button onclick="switcherPressKey(7)">7</button>
          <button onclick="switcherPressKey(8)">8</button>
          <button onclick="switcherPressKey(9)">9</button>
          <button class="clear" onclick="switcherClearPin()">⌫</button>
          <button onclick="switcherPressKey(0)">0</button>
          <button class="enter" onclick="switcherSubmitPin()">⏎</button>
        </div>
        <div id="switcher-error" class="error-message" style="display:none"></div>
      </div>
    </div>
  </div>

  <script src="/translations.js"></script>
  <script src="/timezone-utils.js"></script>
  <script src="/printer-routing.js"></script>
  <!-- Socket.IO for real-time WebSocket events -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <!-- Auto-print WebSocket client for real-time session detection -->
  <script src="/auto-print-websocket.js"></script>
  <script src="/admin.js"></script>
  <!-- Modular admin functions (same order as admin.html) -->
  <script src="/admin-orders.js"></script>
  <script src="/admin-tables.js"></script>
  <script src="/admin-menu.js"></script>
  <script src="/admin-staff.js"></script>
  <script src="/admin-reports.js"></script>
  <script src="/admin-settings.js"></script>
  <script src="/admin-settings-presets.js"></script>
  <script src="/admin-printer.js"></script>
  <script src="/admin-bookings.js"></script>
  <!-- Staff-specific initialization (PIN login + access control) -->
  <script src="/staff.js"></script>
  <!-- QR scanning functionality -->
  <script src="/qr-scanner.js"></script>
</body>
</html>
