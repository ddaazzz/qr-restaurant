<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guide Topic | Chuio Support</title>
  <meta name="description" content="Chuio guide topic details" />
  <link rel="stylesheet" href="/support/guide.css" />
</head>
<body>
  <div class="page-bg"></div>
  <header class="support-nav">
    <div class="support-nav-inner">
      <a class="support-logo" href="/">CHUIO</a>
      <nav class="support-links">
        <a href="/">Home</a>
        <a href="/support" class="active">Support</a>
        <a href="/login">Login</a>
      </nav>
    </div>
  </header>
  <main class="shell">
    <a class="back" href="/support/index.html">← Back to Guide Index</a>
    <article id="topicView" class="topic"></article>
    <div id="notFound" class="empty" hidden>Topic not found. Return to the guide index and select a topic.</div>
  </main>

  <script src="/support/guide-data.js"></script>
  <script>
    (function () {
      function slugify(text) {
        return String(text || '')
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-');
      }

      const topics = window.CHUIO_GUIDE_TOPICS || [];
      const root = document.getElementById('topicView');
      const missing = document.getElementById('notFound');
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const sectionSlugParam = params.get('section');

      const topic = topics.find(t => t.slug === slug);
      if (!topic) {
        root.hidden = true;
        missing.hidden = false;
        document.title = 'Topic Not Found | Chuio Support';
        return;
      }

      const topicSections = (topic.sections || []).map((section, index) => ({
        section,
        sectionIndex: index,
        sectionSlug: section.slug || slugify(section.heading) || `heading-${index + 1}`
      }));

      const activeSectionEntry = sectionSlugParam
        ? topicSections.find(entry => entry.sectionSlug === sectionSlugParam)
        : topicSections[0];

      if (!activeSectionEntry) {
        root.hidden = true;
        missing.hidden = false;
        document.title = 'Heading Not Found | Chuio Support';
        return;
      }

      const { section, sectionIndex, sectionSlug } = activeSectionEntry;
      document.title = `Step ${topic.step} - ${section.heading} | Chuio Support`;

      const pageSequence = [];
      topics
        .slice()
        .sort((a, b) => a.step - b.step)
        .forEach(t => {
          (t.sections || []).forEach((s, i) => {
            const sSlug = s.slug || slugify(s.heading) || `heading-${i + 1}`;
            pageSequence.push({
              step: t.step,
              topicTitle: t.title,
              topicSlug: t.slug,
              heading: s.heading,
              sectionSlug: sSlug,
              href: `/support/topic.html?slug=${encodeURIComponent(t.slug)}&section=${encodeURIComponent(sSlug)}`
            });
          });
        });

      const currentPageIndex = pageSequence.findIndex(
        p => p.topicSlug === topic.slug && p.sectionSlug === sectionSlug
      );
      const previousPage = currentPageIndex > 0 ? pageSequence[currentPageIndex - 1] : null;
      const nextPage = currentPageIndex >= 0 && currentPageIndex < pageSequence.length - 1
        ? pageSequence[currentPageIndex + 1]
        : null;

      const topicImages = (topic.images || []).filter(img => img && img.src);
      const sectionImageMapByStep = {
        1: [[0], [1], [2, 3, 4], [5]],
        2: [[0], [1], [2, 3], []],
        3: [[0, 1], [2], []],
        4: [[0], [1], [], [], []],
        5: [[], []],
        6: [[], [0, 1], [2]],
        7: [[0], [1], [], []],
        8: [[0], []],
        9: [[0], [1]],
        10: [[0], [], []],
        11: [[0], [], [1]],
        12: [[0, 1, 2], []],
        13: [[], []]
      };

      const allImages = [];
      const addLightboxImage = (img) => {
        if (!img || !img.src) return -1;
        allImages.push(img);
        return allImages.length - 1;
      };

      const explicitSectionImages = (section.images || []).filter(img => img && img.src);
      const mappedIndexes = ((sectionImageMapByStep[topic.step] || [])[sectionIndex] || []);
      const mappedSectionImages = mappedIndexes
        .map(index => topicImages[index])
        .filter(Boolean);
      const sectionImages = explicitSectionImages.length ? explicitSectionImages : mappedSectionImages;

      const sectionGallery = sectionImages.length ? `
        <div class="gallery sectionGallery">
          ${sectionImages.map((img) => {
            const i = addLightboxImage(img);
            return `
              <figure class="galleryFig" onclick="openLightbox(${i})">
                <img src="${img.src}" alt="${img.alt || ''}" loading="lazy" onerror="this.closest('.galleryFig').style.display='none'" />
                <figcaption>${img.alt || ''}</figcaption>
              </figure>
            `;
          }).join('')}
        </div>
      ` : '';

      const bottomNav = `
        <nav class="pageNav" aria-label="Heading navigation">
          ${previousPage ? `<a class="pageNavLink prev" href="${previousPage.href}">← ${previousPage.heading}</a>` : '<span class="pageNavGhost"></span>'}
          ${nextPage ? `<a class="pageNavLink next" href="${nextPage.href}">${nextPage.heading} →</a>` : '<span class="pageNavGhost"></span>'}
        </nav>
      `;

      const lightbox = allImages.length ? `
        <div id="lightbox" class="lightbox" onclick="closeLightbox()">
          <button class="lbPrev" onclick="event.stopPropagation();moveLightbox(-1)">&#8249;</button>
          <img id="lbImg" src="" alt="" />
          <button class="lbNext" onclick="event.stopPropagation();moveLightbox(1)">&#8250;</button>
          <button class="lbClose" onclick="closeLightbox()">&#10005;</button>
        </div>
      ` : '';

      root.innerHTML = `
        <span class="eyebrow">STEP ${topic.step}</span>
        <h1>${section.heading}</h1>
        <p class="topicParent">${topic.title}</p>
        <p>${section.summary || topic.summary}</p>
        <section class="section">
          <h2>${section.heading}</h2>
          <ul>
            ${(section.points || []).map(point => `<li>${point}</li>`).join('')}
          </ul>
          ${sectionGallery}
        </section>
        ${bottomNav}
        ${lightbox}
      `;

      // Lightbox logic
      let lbIndex = 0;
      window.openLightbox = function(i) {
        if (!allImages.length) return;
        lbIndex = i;
        document.getElementById('lbImg').src = allImages[lbIndex].src;
        document.getElementById('lbImg').alt = allImages[lbIndex].alt;
        document.getElementById('lightbox').classList.add('open');
      };
      window.closeLightbox = function() {
        if (!allImages.length) return;
        document.getElementById('lightbox').classList.remove('open');
      };
      window.moveLightbox = function(dir) {
        if (!allImages.length) return;
        lbIndex = (lbIndex + dir + allImages.length) % allImages.length;
        document.getElementById('lbImg').src = allImages[lbIndex].src;
        document.getElementById('lbImg').alt = allImages[lbIndex].alt;
      };
      document.addEventListener('keydown', function(e) {
        const lb = document.getElementById('lightbox');
        if (!lb || !lb.classList.contains('open')) return;
        if (e.key === 'ArrowLeft') window.moveLightbox(-1);
        if (e.key === 'ArrowRight') window.moveLightbox(1);
        if (e.key === 'Escape') window.closeLightbox();
      });
    })();
  </script>
</body>
</html>
