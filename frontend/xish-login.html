<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XISH — 商戶登入 · Merchant Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f8fa;
      --bg-2: #ffffff;
      --gold: #b8953e;
      --gold-dark: #8c6e28;
      --text: #111827;
      --text-mid: #4b5563;
      --text-dim: #9ca3af;
      --border: rgba(184,149,62,0.25);
      --border-dim: #e5e7eb;
      --red: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 0%, transparent 100%);
      pointer-events: none;
    }
    .login-card {
      position: relative;
      background: var(--bg-2);
      border: 1px solid var(--border-dim);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    }
    .logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo-text {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.06em;
    }
    .logo-x   { color: var(--gold); font-style: italic; }
    .logo-ish { color: var(--text); }
    .logo-sub {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--gold);
      font-weight: 600;
      text-align: center;
      margin-bottom: 32px;
    }
    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-sub {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      background: #f9fafb;
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus { border-color: var(--gold); background: #ffffff; }
    input::placeholder { color: var(--text-dim); }
    .btn-submit {
      width: 100%;
      background: var(--gold);
      color: #ffffff;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.03em;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .back-link a { color: var(--gold); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
    .divider {
      border: none;
      border-top: 1px solid var(--border-dim);
      margin: 28px 0;
    }
    .chuio-link {
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
    }
    .chuio-link a { color: var(--text-mid); transition: color 0.2s; }
    .chuio-link a:hover { color: var(--text); }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <span class="logo-text"><span class="logo-x">X</span><span class="logo-ish">ISH</span></span>
  </div>
  <div class="logo-sub">MERCHANT PORTAL</div>

  <div class="form-title">登入 · Sign in</div>
  <div class="form-sub">存取您的 XISH 商戶儀表板 · Access your XISH loyalty dashboard</div>

  <div class="error-msg" id="error-msg"></div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="field">
      <label>電郵地址 · Email</label>
      <input type="email" id="email" placeholder="admin@restaurant.com" required autocomplete="username" />
    </div>
    <div class="field">
      <label>密碼 · Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
    </div>
    <button type="submit" class="btn-submit" id="submit-btn">登入 · Sign In</button>
  </form>

  <hr class="divider" />

  <div class="chuio-link">
    Looking for the restaurant portal? <a href="/login.html">Sign in to Chuio</a>
  </div>
</div>

<div class="back-link"><a href="/xish">← Back to XISH</a></div>

<script>
// Redirect if already logged in with a valid XISH merchant token
  (function () {
    const t = localStorage.getItem("xish_merchant_token");
    const r = localStorage.getItem("xish_restaurantId");
    if (t && r) window.location.replace("/xish/admin");
  })();

  async function handleLogin(e) {
    e.preventDefault();
    const btn  = document.getElementById("submit-btn");
    const err  = document.getElementById("error-msg");
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    btn.disabled = true;
    btn.textContent = "登入中… Signing in…";
    err.style.display = "none";

    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Invalid credentials");
      }

      // Check XISH is enabled for this restaurant before granting access
      const settingsRes = await fetch("/api/restaurants/" + data.restaurantId + "/settings", {
        headers: { Authorization: "Bearer " + data.token }
      });
      if (settingsRes.ok) {
        const settings = await settingsRes.json();
        const xishEnabled = settings.xish_enabled || (settings.feature_flags && settings.feature_flags.xish);
        if (!xishEnabled && data.role !== "superadmin") {
          throw new Error("XISH is not enabled for your restaurant. Please contact your administrator.");
        }
      }

      // Persist auth under xish_merchant_ keys (separate from main Chuio session and customer xish_token)
      localStorage.setItem("xish_merchant_token", data.token);
      localStorage.setItem("xish_role", data.role);
      localStorage.setItem("xish_restaurantId", String(data.restaurantId));
      if (data.restaurantTimezone) localStorage.setItem("xish_restaurantTimezone", data.restaurantTimezone);

      window.location.replace("/xish/admin");
    } catch (ex) {
      err.textContent = ex.message;
      err.style.display = "block";
      btn.disabled = false;
      btn.textContent = "登入 · Sign In";
    }
  }
</script>

</body>
</html>
