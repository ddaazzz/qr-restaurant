<!DOCTYPE html>
<html>
<head>
  <title>Test Button Visibility</title>
  <style>
    .menu-btn {
      display: none !important;
    }
    .menu-btn.visible {
      display: flex !important;
    }
    .menu-btn {
      padding: 10px 20px;
      margin: 5px;
      border: 1px solid #ccc;
      background: #eee;
    }
  </style>
</head>
<body>
  <h1>Button Visibility Test</h1>
  
  <div id="buttons">
    <button class="menu-btn" id="orders-nav-btn">Orders</button>
    <button class="menu-btn" id="tables-nav-btn">Tables</button>
    <button class="menu-btn" id="menu-nav-btn">Menu</button>
    <button class="menu-btn" id="staff-nav-btn">Staff</button>
    <button class="menu-btn" id="settings-nav-btn">Settings</button>
    <button class="menu-btn" id="bookings-nav-btn">Bookings</button>
  </div>

  <script>
    // Test data
    const staffAccessRights = [1, 2, 3, 4, 5, 6]; // All 6 features

    function hasAccessRight(featureId) {
      if (!staffAccessRights) return false;
      if (Array.isArray(staffAccessRights)) {
        return staffAccessRights.includes(featureId);
      }
      return false;
    }

    // Apply access control
    const navButtonMap = [
      { id: 'orders-nav-btn', featureId: 1, name: 'Orders' },
      { id: 'tables-nav-btn', featureId: 2, name: 'Tables' },
      { id: 'menu-nav-btn', featureId: 3, name: 'Menu' },
      { id: 'staff-nav-btn', featureId: 4, name: 'Staff' },
      { id: 'settings-nav-btn', featureId: 5, name: 'Settings' },
      { id: 'bookings-nav-btn', featureId: 6, name: 'Bookings' },
    ];

    navButtonMap.forEach(({ id, featureId, name }) => {
      const btn = document.getElementById(id);
      if (!btn) {
        console.log(`❌ ${name} button (${id}) not found in DOM`);
        return;
      }
      
      if (hasAccessRight(featureId)) {
        btn.classList.add('visible');
        console.log(`✅ ${name} tab shown (feature ${featureId})`);
      } else {
        btn.classList.remove('visible');
        console.log(`❌ No access to ${name} (feature ${featureId})`);
      }
    });

    console.log("Test complete. Check the page to see which buttons are visible.");
  </script>
</body>
</html>
